/* ==================== 威胁计算引擎 ==================== */
function lookupFactor(factorId, value){
    const rule = FACTOR_RULES.find(r=>r.id===factorId);
    if(!rule) return 0;
    // F4 距离紧迫度特殊计算
    if(factorId==='F4'){
        const dMax = 80;
        return Math.max(0, Math.min(1, 1 - value/dMax));
    }
    const lvl = rule.levels.find(l=>l.label===value);
    return lvl ? lvl.val : 0.4;
}

function calcThreat(t){
    // Step 1: 提取9个因子
    const f1 = lookupFactor('F1', t.type.typeClass);
    const f2 = lookupFactor('F2', t.state);
    // F3 功率：根据当前状态调整
    let f3;
    if(t.state==='关机') f3=0;
    else if(t.state==='LPI低截获') f3 = lookupFactor('F3','低功率 (<30kW)');
    else if(t.state==='闪避照射') f3 = lookupFactor('F3','中功率 (30-100kW)');
    else f3 = lookupFactor('F3', t.type.maxPow>=200?'满功率 (>200kW)': t.type.maxPow>=100?'高功率 (100-200kW)':'中功率 (30-100kW)');
    const f4 = lookupFactor('F4', t.dist);
    const f5 = lookupFactor('F5', t.lock);
    const f6 = lookupFactor('F6', t.weapon);
    const f7 = lookupFactor('F7', t.band);
    const f8 = lookupFactor('F8', t.window);
    const f9 = lookupFactor('F9', t.type.strategic);

    const factors = {F1:f1,F2:f2,F3:f3,F4:f4,F5:f5,F6:f6,F7:f7,F8:f8,F9:f9};

    // Step 2: 归一化权重
    const wSum = Object.values(WEIGHTS).reduce((a,b)=>a+b,0);
    const nw = {};
    for(let k in WEIGHTS) nw[k] = WEIGHTS[k]/wSum;

    // Step 3: 加权求和
    let score = 0;
    const contributions = {};
    for(let k in factors){
        contributions[k] = factors[k] * nw[k];
        score += contributions[k];
    }

    // Step 4: 强制覆盖规则
    let overrideReason = null;
    // 规则1: 锁定+武器就绪
    if(t.lock==='锁定本机' && (t.weapon==='武器就绪+已锁定'||t.weapon==='武器就绪+搜索中')){
        score = Math.max(score, 0.88);
        overrideReason = '强制LEVEL_5: 火力通道锁定';
    }
    // 规则2: 火控+极近
    if(t.type.typeClass==='火控雷达' && t.dist<10){
        score = Math.max(score, 0.85);
        overrideReason = '强制LEVEL_5: 火控极近距离';
    }
    // 规则3: 关机衰减
    if(t.state==='关机' && t.offTime>30){
        score *= 0.5;
        overrideReason = '衰减×0.5: 长期关机';
    }
    // 规则4: 不匹配+LPI
    if(t.band==='不匹配' && (t.state==='LPI低截获'||t.state==='关机')){
        score *= 0.3;
        overrideReason = '衰减×0.3: 不可截获';
    }

    score = Math.max(0, Math.min(1, score));

    // Step 5: 等级映射
    let level = LEVEL_MAP[4]; // 默认微
    for(let lm of LEVEL_MAP){
        if(score >= lm.min && score < lm.max + 0.001){level = lm; break}
    }

    return {score, level, factors, contributions, normalizedWeights: nw, overrideReason};
}

function sortTargets(){
    targets.forEach(t => { t.threat = calcThreat(t); });
    targets.sort((a,b) => {
        if(b.threat.level.level !== a.threat.level.level) return b.threat.level.level - a.threat.level.level;
        if(Math.abs(b.threat.score - a.threat.score) > 0.001) return b.threat.score - a.threat.score;
        return a.dist - b.dist; // 同分按距离
    });
}

/* ==================== 态势Canvas ==================== */
let cvInfo = null, animT = 0;
function initCv(){
    const cv = document.getElementById('cv');
    const r = cv.parentElement.getBoundingClientRect();
    const d = window.devicePixelRatio || 1;
    cv.width = r.width*d; cv.height = r.height*d;
    cv.style.width = r.width+'px'; cv.style.height = r.height+'px';
    const c = cv.getContext('2d'); c.scale(d,d);
    return {cv,c,w:r.width,h:r.height};
}

function drawSweep(c,x,y,radius,startAngle,color){
    const endAngle = startAngle + 0.6;
    c.beginPath(); c.moveTo(x,y);
    c.arc(x,y,Math.max(1,radius),startAngle,endAngle);
    c.closePath();
    const grad = c.createRadialGradient(x,y,0,x,y,Math.max(1,radius));
    grad.addColorStop(0, color.replace(')',',0.25)').replace('rgb','rgba'));
    grad.addColorStop(1, color.replace(')',',0)').replace('rgb','rgba'));
    c.fillStyle = grad; c.fill();
}

function drawRadar(c){
    c.clearRect(0,0,c.canvas.width/canvas.getContext('2d').getTransform().a,c.canvas.height/c.canvas.getContext('2d').getTransform().a);
    const w=cvInfo.w, h=cvInfo.h;
    // 背景
    c.fillStyle='#080c16'; c.fillRect(0,0,w,h);
    const cx=w*0.38, cy=h*0.5;
    // 同心距离圈
    [40,80,120,160].forEach((r,i)=>{
        c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2);
        c.strokeStyle='rgba(28,46,74,.3)'; c.lineWidth=.5; c.stroke();
        c.fillStyle='rgba(80,101,128,.2)'; c.font='8px Rajdhani'; c.textAlign='left';
        c.fillText((r===40?20:r===80?40:r===120?60:80)+'km', cx+r+3, cy-2);
    });
    // 十字线
    c.strokeStyle='rgba(28,46,74,.25)'; c.lineWidth=.5;
    c.beginPath(); c.moveTo(cx-170,cy); c.lineTo(cx+170,cy); c.stroke();
    c.beginPath(); c.moveTo(cx,cy-170); c.lineTo(cx,cy+170); c.stroke();
    // 方位标注
    c.fillStyle='rgba(80,101,128,.35)'; c.font='9px Rajdhani'; c.textAlign='center';
    ['N','NE','E','SE','S','SW','W','NW'].forEach((d,i)=>{
        const a = -Math.PI/2 + i*Math.PI/4;
        c.fillText(d, cx+Math.cos(a)*172, cy+Math.sin(a)*172+3);
    });
    // 扫描线
    const sweepAngle = (animT*0.015)%(Math.PI*2);
    drawRweep(c,cx,cy,160,sweepAngle,'rgba(255,215,0,0.3)');
    // 目标点
    targets.forEach((t,i)=>{
        const ang = -Math.PI/2 + 0.3; // 简化：所有目标在偏北方向
        const angOff = (i - targets.length/2) * 0.08;
        const a = ang + angOff;
        const dist = Math.min(160, t.dist * 2); // 缩放到显示范围
        const tx = cx + Math.cos(a)*dist;
        const ty = cy + Math.sin(a)*dist;
        const th = t.threat;
        const {r:cr,g:cg,b:cb} = h2c(th.level.color);
        // 光晕
        if(th.level.level>=4){
            const pulseR = 6 + Math.sin(animT*0.08+i)*3;
            c.beginPath(); c.arc(tx,ty,pulseR,0,Math.PI*2);
            c.fillStyle=`rgba(${cr},${cg},${cb},${0.15+Math.sin(animT*0.08+i)*0.1})`;
            c.fill();
        }
        // 点
        c.beginPath(); c.arc(tx,ty,4,0,Math.PI*2);
        c.fillStyle=th.level.color; c.fill();
        c.strokeStyle=`rgba(${cr},${cg},${cb},0.5)`; c.lineWidth=1; c.stroke();
        // 编号
        c.font='bold 8px Rajdhani'; c.textAlign='center'; c.fillStyle=th.level.color;
        c.fillText(t.id, tx, ty-8);
    });
    // 本机
    c.beginPath(); c.arc(cx,cy,5,0,Math.PI*2);
    c.fillStyle='#00e68a'; c.fill();
    c.strokeStyle='rgba(0,230,138,.5)'; c.lineWidth=1.5; c.stroke();
    c.font='bold 9px Rajdhani'; c.textAlign='center'; c.fillStyle='#00e68a';
    c.fillText('UAV',cx,cy+14);

    // 右侧威胁排序条形图
    const barX = w*0.72, barW = w*0.25, barTop = 30;
    c.fillStyle='rgba(28,46,74,.15)'; c.font='bold 10px Rajdhani'; c.textAlign='left';
    c.fillText('THREAT RANKING', barX, barTop-5);
    const sortedTargets = [...targets].sort((a,b)=>b.threat.score-a.threat.score);
    sortedTargets.forEach((t,i)=>{
        const by = barTop + i*22;
        const bw = (barW-50) * t.threat.score;
        const {r:cr,g:cg,b:cb} = h2c(t.threat.level.color);
        // 背景
        c.fillStyle='rgba(28,46,74,.1)'; c.fillRect(barX,by,barW-50,16);
        // 分数条
        c.fillStyle=`rgba(${cr},${cg},${cb},0.5)`;
        c.beginPath(); c.roundRect(barX,by,Math.max(1,bw),16,2); c.fill();
        // 标签
        c.font='8px Rajdhani'; c.textAlign='right'; c.fillStyle='#506580';
        c.fillText(t.id,barX-4,by+12);
        c.textAlign='left'; c.fillStyle=t.threat.level.color;
        c.fillText(t.threat.score.toFixed(2), barX+Math.max(1,bw)+4, by+12);
        // 名称
        c.font='8px Noto Sans SC'; c.fillStyle='#c0cfe0';
        c.fillText(t.name.split(' ').pop(), barX+4, by+12);
    });
}

function drawRweep(c,x,y,r,startAngle,color){
    const end = startAngle + 0.5;
    c.beginPath(); c.moveTo(x,y); c.arc(x,y,Math.max(1,r),startAngle,end); c.closePath();
    const g = c.createConicGradient(startAngle,x,y);
    g.addColorStop(0,color); g.addColorStop(0.08,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=g; c.fill();
}

function h2c(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}

/* ==================== 仿真推演 ==================== */
function simulate(){
    // 随机变化部分目标参数
    targets.forEach(t => {
        // 距离变化（模拟飞行接近）
        if(t.state!=='关机'){
            t.dist = Math.max(3, t.dist + (Math.random()-0.55)*4);
            t.dist = Math.round(t.dist*10)/10;
        }
        // 状态可能变化
        if(Math.random()<0.2){
            const possibleStates = ['全功率开机','正常开机','LPI低截获','闪避照射','关机'];
            t.state = possibleStates[Math.floor(Math.random()*possibleStates.length)];
            if(t.state==='关机') t.offTime = 0;
        }
        // 锁定状态变化
        if(Math.random()<0.15){
            t.lock = LOCK_STATES[Math.floor(Math.random()*LOCK_STATES.length)];
        }
        // 关机计时
        if(t.state==='关机') t.offTime += 2;
        else t.offTime = 0;
        // 窗口评估联动
        if(t.state==='关机') t.window = '无窗口';
        else if(t.state==='闪避照射') t.window = Math.random()>0.5?'窗口狭窄 (5-20s)':'窗口极短 (<5s)';
        else if(t.state==='LPI低截获') t.window = Math.random()>0.5?'窗口中等 (20-60s)':'窗口狭窄 (5-20s)';
        else t.window = Math.random()>0.3?'窗口充裕 (>60s)':'窗口中等 (20-60s)';
    });
    recalc();
}

function recalc(){
    sortTargets();
    renderTargetList();
    if(selId) renderCalcDetail();
}

/* ==================== 时钟 ==================== */
function updClk(){document.getElementById('clock').textContent=new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}

/* ==================== 动画 ==================== */
function animate(){animT++;if(cvInfo)drawRadar(cvInfo.c);requestAnimationFrame(animate)}

/* ==================== roundRect polyfill ==================== */
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r,r,r,r];this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.quadraticCurveTo(x+w,y,x+w,y+r[1]);this.lineTo(x+w,y+h-r[2]);this.quadraticCurveTo(x+w,y+h,x+w-r[2],y+h);this.lineTo(x+r[3],y+h);this.quadraticCurveTo(x,y+h,x,y+h-r[3]);this.lineTo(x,y+r[0]);this.quadraticCurveTo(x,y,x+r[0],y);this.closePath();return this}}

/* ==================== 初始化 ==================== */
document.addEventListener('DOMContentLoaded',()=>{
    generateTargets();
    sortTargets();
    renderRules();
    renderWeights();
    renderLevelMap();
    renderOverrides();
    renderTargetList();
    cvInfo = initCv();
    updClk(); setInterval(updClk,1000);
    setInterval(simulate, 2000); // 每2秒自动仿真
    animate();
    window.addEventListener('resize',()=>{cvInfo=initCv()});
});
</script>
</body>
