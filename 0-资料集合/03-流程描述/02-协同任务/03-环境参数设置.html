<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境参数设置 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 主布局：左右两列 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
        }

        /* 左侧配置面板 */
        .left-panel {
            width: 360px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .panel-header i {
            margin-right: 6px;
            color: #4a9eff;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* 分组卡片 */
        .section-card {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .section-header {
            padding: 10px 12px;
            background-color: #2a2a3c;
            border-bottom: 1px solid #333;
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
        }

        .section-header i {
            color: #4a9eff;
            margin-right: 6px;
        }

        .section-body {
            padding: 12px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-row label {
            width: 100px;
            color: #aaa;
            font-size: 13px;
        }

        .form-row .value {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input, select, textarea {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .file-input-group {
            display: flex;
            gap: 4px;
        }

        .file-input-group input {
            flex: 1;
        }

        .file-input-group button {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
        }

        .file-input-group button:hover {
            background-color: #3a3a5a;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ccc;
            font-size: 13px;
        }

        .checkbox-label input {
            width: auto;
        }

        /* 右侧地图预览 */
        .right-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .map-header {
            padding: 10px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .map-header i {
            color: #4a9eff;
        }

        .map-container {
            flex: 1;
            background-color: #0a1a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
            position: relative;
        }

        .map-placeholder {
            text-align: center;
        }

        .map-placeholder i {
            font-size: 64px;
            color: #333;
            margin-bottom: 16px;
        }

        .map-coords {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #aaa;
        }

        /* 底部工具栏 */
        .bottom-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn i {
            color: #4a9eff;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        .btn-primary i {
            color: #4a9eff;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-globe-asia" style="margin-right: 8px; color: #4a9eff;"></i>环境参数设置</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 左侧配置面板 -->
            <div class="left-panel">
                <div class="panel-header">
                    <i class="fas fa-sliders-h"></i> 环境参数配置
                </div>
                <div class="panel-content">
                    <!-- 地理环境设置 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-mountain"></i> 地理环境
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>地形数据源</label>
                                <div class="value">
                                    <select>
                                        <option>本地文件导入</option>
                                        <option>在线数据获取</option>
                                        <option>预设数据库</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>高程文件</label>
                                <div class="value file-input-group">
                                    <input type="text" placeholder="选择文件..." value="DEM_region.tif">
                                    <button><i class="fas fa-folder-open"></i> 浏览</button>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>采样间隔</label>
                                <div class="value">
                                    <input type="number" value="30" step="1" min="1"> 米
                                </div>
                            </div>
                            <div class="form-row">
                                <label>障碍物文件</label>
                                <div class="value file-input-group">
                                    <input type="text" placeholder="选择文件..." value="obstacles.shp">
                                    <button><i class="fas fa-folder-open"></i> 浏览</button>
                                </div>
                            </div>
                            <div class="checkbox-label">
                                <input type="checkbox" checked> <span>显示障碍物</span>
                            </div>
                        </div>
                    </div>

                    <!-- 气象环境设置 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-cloud-sun"></i> 气象环境
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>温度</label>
                                <div class="value">
                                    <input type="number" value="15" step="0.1"> ℃
                                </div>
                            </div>
                            <div class="form-row">
                                <label>气压</label>
                                <div class="value">
                                    <input type="number" value="1013" step="0.1"> hPa
                                </div>
                            </div>
                            <div class="form-row">
                                <label>湿度</label>
                                <div class="value">
                                    <input type="number" value="50" step="1" min="0" max="100"> %
                                </div>
                            </div>
                            <div class="form-row">
                                <label>风速</label>
                                <div class="value">
                                    <input type="number" value="5" step="0.1"> m/s
                                </div>
                            </div>
                            <div class="form-row">
                                <label>风向</label>
                                <div class="value">
                                    <input type="number" value="180" step="1" min="0" max="360"> °
                                </div>
                            </div>
                            <div class="form-row">
                                <label>能见度</label>
                                <div class="value">
                                    <input type="number" value="10" step="0.1"> km
                                </div>
                            </div>
                            <div class="form-row">
                                <label>降水类型</label>
                                <div class="value">
                                    <select>
                                        <option>无降水</option>
                                        <option>小雨</option>
                                        <option>中雨</option>
                                        <option>大雨</option>
                                        <option>雪</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>云底高度</label>
                                <div class="value">
                                    <input type="number" value="2000" step="100"> m
                                </div>
                            </div>
                            <div class="form-row">
                                <label>云量</label>
                                <div class="value">
                                    <input type="number" value="3" step="1" min="1" max="8"> /8
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 风场模型（可选高级） -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-wind"></i> 风场模型
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>模型类型</label>
                                <div class="value">
                                    <select>
                                        <option>恒定风</option>
                                        <option>风切变</option>
                                        <option>湍流模型</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>风廓线指数</label>
                                <div class="value">
                                    <input type="number" value="0.14" step="0.01">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧地图预览 -->
            <div class="right-panel">
                <div class="map-header">
                    <i class="fas fa-map"></i> 地理环境预览
                </div>
                <div class="map-container">
                    <div class="map-placeholder">
                        <i class="fas fa-map-marked-alt"></i>
                        <p>地图预览区域</p>
                        <p style="font-size:14px; color:#555;">此处将显示地形、障碍物分布</p>
                    </div>
                    <div class="map-coords">
                        鼠标位置: 125.32°E, 78.56°N  |  高程: 350m
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-bar">
            <div class="btn"><i class="fas fa-sync-alt"></i> 重置</div>
            <div class="btn"><i class="fas fa-save"></i> 保存配置</div>
            <div class="btn btn-primary"><i class="fas fa-check"></i> 应用设置</div>
        </div>
    </div>
</body>
</html>
