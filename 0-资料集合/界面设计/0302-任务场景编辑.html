<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务场景编辑 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 工具栏 */
        .toolbar {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar i {
            font-size: 18px;
            color: #aaa;
            transition: color 0.2s;
            cursor: default;
        }

        .toolbar i:hover {
            color: #4a9eff;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background-color: #444;
            margin: 0 8px;
        }

        .toolbar-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 主布局：三列 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
        }

        /* 左侧场景元素面板 */
        .left-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .scene-tree {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border-radius: 4px;
            margin-bottom: 2px;
            cursor: default;
            transition: background 0.2s;
        }

        .tree-item:hover {
            background-color: #2a2a42;
        }

        .tree-item.selected {
            background-color: #2a2a5a;
            border-left: 2px solid #4a9eff;
        }

        .tree-item i {
            color: #4a9eff;
            width: 20px;
            margin-right: 6px;
        }

        .tree-item .name {
            flex: 1;
            font-size: 13px;
        }

        .tree-item .badge {
            background-color: #2a2a5a;
            color: #4a9eff;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        .tree-folder {
            font-weight: 500;
            color: #ddd;
            margin-top: 8px;
            padding: 4px 0;
        }

        .tree-folder i {
            color: #ffaa00;
        }

        .scene-info {
            background-color: #222236;
            border-top: 1px solid #333;
            padding: 12px;
        }

        .info-row {
            display: flex;
            margin-bottom: 6px;
        }

        .info-label {
            width: 70px;
            color: #aaa;
        }

        .info-value {
            flex: 1;
        }

        .info-value input {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            width: 100%;
        }

        /* 中央地图区域 */
        .center-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .center-tabs {
            display: flex;
            border-bottom: 1px solid #333;
            background-color: #1e1e2f;
        }

        .tab-item {
            padding: 10px 20px;
            cursor: default;
            color: #aaa;
            border-bottom: 2px solid transparent;
        }

        .tab-item.active {
            color: white;
            border-bottom-color: #4a9eff;
            background-color: #2a2a42;
        }

        .tab-content {
            flex: 1;
            position: relative;
        }

        .tab-pane {
            display: none;
            width: 100%;
            height: 100%;
        }

        .tab-pane.active {
            display: block;
        }

        .map-container {
            width: 100%;
            height: 100%;
            background-color: #1a1a2a;
            position: relative;
        }

        .map-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(74, 158, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 158, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        .map-svg {
            width: 100%;
            height: 100%;
        }

        .property-editor {
            height: 100%;
            overflow-y: auto;
            padding: 16px;
        }

        /* 右侧任务参数面板 */
        .right-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section {
            padding: 12px;
            border-bottom: 1px solid #333;
        }

        .section-title {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .param-row label {
            color: #aaa;
        }

        .param-row input, .param-row select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 4px 6px;
            border-radius: 4px;
            width: 140px;
        }

        .constraint-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .constraint-item input[type="checkbox"] {
            accent-color: #4a9eff;
        }

        .priority-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .priority-table th {
            background-color: #2a2a3c;
            color: #aaa;
            font-weight: 400;
            padding: 6px;
            text-align: left;
        }

        .priority-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #333;
        }

        .priority-table select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            width: 100%;
        }

        /* 底部状态栏 */
        .status-bar {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }

        /* 按钮 */
        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn i {
            color: #4a9eff;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 地图图标 */
        .map-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #4a9eff;
            border-radius: 50%;
            border: 2px solid white;
            transform: translate(-50%, -50%);
            cursor: default;
        }

        .map-marker.target {
            background-color: #f44336;
        }

        .map-marker.uav {
            background-color: #4a9eff;
        }

        .map-marker.threat {
            background-color: #ffaa00;
        }

        .map-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-map-marked-alt" style="margin-right:8px; color:#4a9eff;"></i>任务场景编辑</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-group">
                <i class="fas fa-file" title="新建场景"></i>
                <i class="fas fa-folder-open" title="打开场景"></i>
                <i class="fas fa-save" title="保存场景"></i>
            </div>
            <span class="toolbar-separator"></span>
            <div class="toolbar-group">
                <i class="fas fa-bullseye" title="添加目标"></i>
                <i class="fas fa-plane" title="添加无人机"></i>
                <i class="fas fa-exclamation-triangle" title="添加威胁"></i>
            </div>
            <span class="toolbar-separator"></span>
            <div class="toolbar-group">
