<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 数据源与变量选择 */
        .data-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }

        .data-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .data-row label {
            width: 80px;
            color: #aaa;
        }

        .data-row select, .data-row input {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            flex: 1;
        }

        .variable-list {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        .variable-list label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        .variable-list input {
            margin-right: 6px;
        }

        /* 分析类型 */
        .analysis-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-group label {
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .analysis-panel select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        /* 主内容区：左右两列 */
        .content-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
        }

        /* 左侧统计表格 */
        .left-panel {
            width: 40%;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 10px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            font-size: 14px;
            color: #ccc;
        }

        .stats-table {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .stats-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .stats-table th {
            background-color: #2a2a3c;
            color: #ccc;
            font-weight: 400;
            padding: 6px;
            text-align: left;
        }

        .stats-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #333;
        }

        .stats-table tr:hover {
            background-color: #2a2a42;
        }

        /* 右侧图表区 */
        .right-panel {
            width: 60%;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-toolbar {
            padding: 8px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            flex: 1;
            padding: 16px;
        }

        #mainChart {
            width: 100%;
            height: 100%;
            min-height: 300px;
        }

        /* 日志区域 */
        .log-area {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
        }

        .progress-bar {
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #6f4aff);
        }

        .log-box {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            height: 80px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-chart-bar" style="margin-right:8px; color:#4a9eff;"></i>统计分析</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 数据源与变量 -->
        <div class="data-panel">
            <div class="data-row">
                <label>数据集：</label>
                <select>
                    <option>exp_001.csv (试验数据)</option>
                    <option>uav_trajectory.db</option>
                    <option>radar_data.xlsx</option>
                </select>
            </div>
            <div class="data-row">
                <label>分析变量：</label>
                <div class="variable-list">
                    <label><input type="checkbox" checked> 经度</label>
                    <label><input type="checkbox" checked> 纬度</label>
                    <label><input type="checkbox" checked> 高度</label>
                    <label><input type="checkbox" checked> 速度</label>
                    <label><input type="checkbox"> 航向角</label>
                    <label><input type="checkbox"> 雷达散射截面</label>
                </div>
            </div>
        </div>

        <!-- 分析类型 -->
        <div class="analysis-panel">
            <div class="radio-group">
                <label><input type="radio" name="analysisType" checked> 描述性统计</label>
                <label><input type="radio" name="analysisType"> 相关性分析</label>
            </div>
            <select id="corrMethod" disabled>
                <option>皮尔逊</option>
                <option>斯皮尔曼</option>
            </select>
            <div class="btn btn-primary" style="margin-left:auto;"><i class="fas fa-play"></i> 执行分析</div>
        </div>

        <!-- 主内容区 -->
        <div class="content-layout">
            <!-- 左侧统计表格 -->
            <div class="left-panel">
                <div class="panel-header"><i class="fas fa-table"></i> 统计结果</div>
                <div class="stats-table">
                    <table>
                        <thead>
                            <tr><th>变量</th><th>均值</th><th>标准差</th><th>最小值</th><th>最大值</th><th>偏度</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>经度</td><td>125.32</td><td>2.34</td><td>118.90</td><td>150.20</td><td>0.12</td></tr>
                            <tr><td>纬度</td><td>78.56</td><td>5.67</td><td>65.23</td><td>95.30</td><td>-0.08</td></tr>
                            <tr><td>高度</td><td>3500</td><td>450</td><td>2800</td><td>4200</td><td>0.35</td></tr>
                            <tr><td>速度</td><td>280</td><td>32</td><td>200</td><td>350</td><td>0.21</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 右侧图表区 -->
            <div class="right-panel">
                <div class="chart-toolbar">
                    <span style="color:#aaa;">图表类型：</span>
                    <select id="chartType">
                        <option>直方图</option>
                        <option>箱线图</option>
                        <option>散点图</option>
                        <option>热力图</option>
                        <option>密度图</option>
                    </select>
                    <span class="btn"><i class="fas fa-sync-alt"></i> 刷新</span>
                    <span class="btn"><i class="fas fa-download"></i> 导出</span>
                </div>
                <div class="chart-container">
                    <div id="mainChart"></div>
                </div>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="log-area">
            <div class="progress-bar">
                <div class="progress-fill" style="width:65%;"></div>
            </div>
            <div class="log-box">
                [15:30:45] 加载数据集 exp_001.csv...<br>
                [15:30:46] 计算描述性统计量...<br>
                [15:30:48] 生成直方图...<br>
                [15:30:50] 分析完成。
            </div>
        </div>
    </div>

    <!-- ECharts 图表初始化 -->
    <script>
        const chartDom = document.getElementById('mainChart');
        const myChart = echarts.init(chartDom);

        // 根据选择的图表类型更新
        function updateChart(type) {
            if (type === '直方图') {
                myChart.setOption({
                    title: { show: false },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: ['125', '126', '127', '128', '129', '130', '131'] },
                    yAxis: { type: 'value' },
                    series: [{
                        name: '经度分布',
                        type: 'bar',
                        data: [5, 12, 18, 25, 22, 15, 8],
                        itemStyle: { color: '#4a9eff' }
                    }]
                });
            } else if (type === '箱线图') {
                myChart.setOption({
                    tooltip: { trigger: 'item' },
                    xAxis: { type: 'category', data: ['经度', '纬度', '高度', '速度'] },
                    yAxis: { type: 'value' },
                    series: [{
                        name: 'boxplot',
                        type: 'boxplot',
                        data: [
                            [118.9, 122.5, 125.3, 128.1, 150.2],
                            [65.2, 72.5, 78.6, 84.2, 95.3],
                            [2800, 3200, 3500, 3800, 4200],
                            [200, 250, 280, 310, 350]
                        ],
                        itemStyle: { color: '#4a9eff' }
                    }]
                });
            } else if (type === '散点图') {
                myChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'value', name: '高度(m)' },
                    yAxis: { type: 'value', name: '速度(m/s)' },
                    series: [{
                        name: '高度 vs 速度',
                        type: 'scatter',
                        data: [[3500,280], [3510,282], [3400,275], [3415,277], [3600,290], [3612,292]],
                        symbolSize: 8,
                        itemStyle: { color: '#4a9eff' }
                    }]
                });
            } else if (type === '热力图') {
                myChart.setOption({
                    tooltip: { position: 'top' },
                    xAxis: { type: 'category', data: ['经度', '纬度', '高度', '速度'] },
                    yAxis: { type: 'category', data: ['经度', '纬度', '高度', '速度'] },
                    visualMap: { min: -1, max: 1, calculable: true, inRange: { color: ['#0a1a2a', '#4a9eff', '#ffaa00'] } },
                    series: [{
                        type: 'heatmap',
                        data: [
                            [0,0,1.0], [0,1,0.2], [0,2,0.5], [0,3,0.3],
                            [1,0,0.2], [1,1,1.0], [1,2,0.4], [1,3,0.1],
                            [2,0,0.5], [2,1,0.4], [2,2,1.0], [2,3,0.6],
                            [3,0,0.3], [3,1,0.1], [3,2,0.6], [3,3,1.0]
                        ]
                    }]
                });
            } else if (type === '密度图') {
                // 简化：用折线图模拟密度
                myChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'value', name: '高度(m)' },
                    yAxis: { type: 'value', name: '密度' },
                    series: [{
                        name: '高度分布',
                        type: 'line',
                        smooth: true,
                        data: [[3000,0.2], [3200,0.5], [3500,1.2], [3800,0.8], [4000,0.3]],
                        lineStyle: { color: '#4a9eff', width: 3 }
                    }]
                });
            }
        }

        // 监听图表类型变化
        document.getElementById('chartType').addEventListener('change', (e) => {
            updateChart(e.target.value);
        });

        // 监听相关性分析启用
        document.querySelectorAll('input[name="analysisType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const disabled = e.target.value !== '相关性分析';
                document.getElementById('corrMethod').disabled = !disabled;
            });
        });

        // 初始化直方图
        updateChart('直方图');
    </script>
</body>
</html>
