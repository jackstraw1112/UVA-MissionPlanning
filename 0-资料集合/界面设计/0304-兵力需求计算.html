<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兵力需求计算 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 主容器 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 主布局：左右两列 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 16px;
        }

        /* 左侧配置面板 */
        .left-panel {
            width: 420px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .panel-header i {
            margin-right: 6px;
            color: #4a9eff;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* 分组卡片 */
        .section-card {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .section-header {
            padding: 10px 12px;
            background-color: #2a2a3c;
            border-bottom: 1px solid #333;
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
        }

        .section-header i {
            color: #4a9eff;
            margin-right: 6px;
        }

        .section-body {
            padding: 12px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .form-row label {
            width: 100px;
            color: #aaa;
            font-size: 13px;
        }

        .form-row .value {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input, select, textarea {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ccc;
            font-size: 13px;
        }

        .checkbox-label input {
            width: auto;
        }

        .small-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 8px;
        }

        .small-table th {
            background-color: #2a2a3c;
            color: #aaa;
            font-weight: 400;
            padding: 6px;
            text-align: left;
        }

        .small-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #333;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #4a9eff;
            cursor: default;
            font-size: 12px;
            margin: 0 2px;
        }

        /* 右侧结果面板 */
        .right-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .result-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .result-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-number {
            font-size: 72px;
            font-weight: 600;
            color: #4a9eff;
            line-height: 1.2;
        }

        .result-label {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .result-detail {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .result-detail-row {
            display: flex;
            margin-bottom: 8px;
        }

        .result-detail-label {
            width: 100px;
            color: #aaa;
        }

        .result-detail-value {
            flex: 1;
            color: white;
        }

        .reasoning-box {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            color: #ccc;
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
        }

        /* 底部工具栏 */
        .bottom-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn i {
            color: #4a9eff;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        .btn-primary i {
            color: #4a9eff;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-calculator" style="margin-right: 8px; color: #4a9eff;"></i>兵力需求计算</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 左侧配置面板 -->
            <div class="left-panel">
                <div class="panel-header">
                    <i class="fas fa-sliders-h"></i> 输入参数
                </div>
                <div class="panel-content">
                    <!-- 任务基本信息 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-bullseye"></i> 任务信息
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>任务类型</label>
                                <div class="value">
                                    <select>
                                        <option>区域侦察</option>
                                        <option>目标定位</option>
                                        <option>电子干扰</option>
                                        <option>硬杀伤</option>
                                        <option selected>协同压制(SEAD)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>成功率要求</label>
                                <div class="value">
                                    <input type="number" value="95" min="0" max="100" step="1"> %
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 目标信息 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-bullseye"></i> 目标信息
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>目标数量</label>
                                <div class="value">
                                    <input type="number" value="8" min="1" step="1">
                                </div>
                            </div>
                            <table class="small-table">
                                <thead>
                                    <tr><th>类型</th><th>威胁等级</th><th>防护能力</th><th></th></tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><select style="padding:2px;"><option>预警雷达</option></select></td>
                                        <td><select style="padding:2px;"><option>高</option></select></td>
                                        <td><select style="padding:2px;"><option>硬防护</option></select></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                    <tr>
                                        <td><select style="padding:2px;"><option>火控雷达</option></select></td>
                                        <td><select style="padding:2px;"><option>中</option></select></td>
                                        <td><select style="padding:2px;"><option>软防护</option></select></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                    <tr>
                                        <td><select style="padding:2px;"><option>通信节点</option></select></td>
                                        <td><select style="padding:2px;"><option>低</option></select></td>
                                        <td><select style="padding:2px;"><option>无防护</option></select></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                </tbody>
                            </table>
                            <div style="display: flex; gap: 4px; margin-top: 8px;">
                                <button class="btn-icon" style="background:#2a2a42; padding:4px 8px;"><i class="fas fa-plus"></i> 添加行</button>
                                <button class="btn-icon" style="background:#2a2a42; padding:4px 8px;"><i class="fas fa-file-import"></i> 导入</button>
                            </div>
                        </div>
                    </div>

                    <!-- 战场环境 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-cloud-sun"></i> 战场环境
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>地形复杂度</label>
                                <div class="value">
                                    <select>
                                        <option>平坦 (1.0)</option>
                                        <option>丘陵 (0.9)</option>
                                        <option>山地 (0.7)</option>
                                        <option>复杂 (0.5)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>气象影响</label>
                                <div class="value">
                                    <select>
                                        <option>良好 (1.0)</option>
                                        <option>轻度 (0.9)</option>
                                        <option>中度 (0.7)</option>
                                        <option>重度 (0.4)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>电磁干扰</label>
                                <div class="value">
                                    <select>
                                        <option>无 (1.0)</option>
                                        <option>弱 (0.8)</option>
                                        <option>中 (0.5)</option>
                                        <option>强 (0.2)</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 无人机资源 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-plane"></i> 无人机资源
                        </div>
                        <div class="section-body">
                            <table class="small-table">
                                <thead>
                                    <tr><th>型号</th><th>可用数量</th><th>基础成功率</th><th></th></tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>JWS-01</td>
                                        <td><input type="number" value="120" style="width:60px;"></td>
                                        <td><input type="number" value="0.85" step="0.01" min="0" max="1" style="width:60px;"></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                    <tr>
                                        <td>JWS-02</td>
                                        <td><input type="number" value="80" style="width:60px;"></td>
                                        <td><input type="number" value="0.78" step="0.01" style="width:60px;"></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                    <tr>
                                        <td>JWS-03</td>
                                        <td><input type="number" value="40" style="width:60px;"></td>
                                        <td><input type="number" value="0.92" step="0.01" style="width:60px;"></td>
                                        <td><i class="fas fa-trash-alt btn-icon"></i></td>
                                    </tr>
                                </tbody>
                            </table>
                            <div style="display: flex; gap: 4px; margin-top: 8px;">
                                <button class="btn-icon" style="background:#2a2a42; padding:4px 8px;"><i class="fas fa-plus"></i> 添加机型</button>
                                <button class="btn-icon" style="background:#2a2a42; padding:4px 8px;"><i class="fas fa-file-import"></i> 导入</button>
                            </div>
                            <div style="margin-top:8px; color:#aaa;">可用总数: 240 架</div>
                        </div>
                    </div>

                    <!-- 算法参数 -->
                    <div class="section-card">
                        <div class="section-header">
                            <i class="fas fa-cogs"></i> 算法参数
                        </div>
                        <div class="section-body">
                            <div class="form-row">
                                <label>计算方法</label>
                                <div class="value">
                                    <select>
                                        <option>解析模型 (快速)</option>
                                        <option selected>蒙特卡洛仿真 (精确)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>迭代次数</label>
                                <div class="value">
                                    <input type="number" value="1000" step="100" min="100">
                                </div>
                            </div>
                            <div class="checkbox-label">
                                <input type="checkbox" checked> <span>考虑航程约束</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧结果面板 -->
            <div class="right-panel">
                <div class="result-header">
                    <i class="fas fa-chart-line"></i> 计算结果
                </div>
                <div class="result-content">
                    <div class="result-number">186</div>
                    <div class="result-label">所需无人机数量 (架)</div>

                    <div class="result-detail">
                        <div class="result-detail-row">
                            <span class="result-detail-label">编组方案</span>
                            <span class="result-detail-value">JWS-01: 93架, JWS-02: 62架, JWS-03: 31架</span>
                        </div>
                        <div class="result-detail-row">
                            <span class="result-detail-label">置信区间</span>
                            <span class="result-detail-value">95% CI: ±3 架</span>
                        </div>
                        <div class="reasoning-box">
                            <strong>计算依据：</strong><br>
                            采用蒙特卡洛仿真 (1000次迭代)，综合环境修正因子 0.85。<br>
                            目标数量8，单机平均成功率 0.85，任务要求成功率 95%。<br>
                            最小满足条件的数量为186架，实际可用资源240架，满足需求。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-bar">
            <div class="btn"><i class="fas fa-save"></i> 保存配置</div>
            <div class="btn btn-primary"><i class="fas fa-calculator"></i> 开始计算</div>
        </div>
    </div>
</body>
</html>
