<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化展示 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 变量选择面板 */
        .control-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-item label {
            color: #aaa;
            font-size: 13px;
        }

        .control-item select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
        }

        /* 图表类型工具栏 */
        .chart-toolbar {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .chart-type-group {
            display: flex;
            gap: 8px;
        }

        .chart-btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .chart-btn.active {
            background-color: #2a2a5a;
            color: white;
            border-color: #4a9eff;
        }

        .chart-btn i {
            color: #4a9eff;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        /* 图表区域 */
        .chart-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-header {
            padding: 8px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-header span {
            color: #ccc;
        }

        .chart-container {
            flex: 1;
            padding: 16px;
        }

        #mainChart {
            width: 100%;
            height: 100%;
            min-height: 300px;
        }

        /* 日志区域 */
        .log-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
        }

        .progress-bar {
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #6f4aff);
        }

        .log-box {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            height: 80px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-chart-pie" style="margin-right:8px; color:#4a9eff;"></i>可视化展示</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 变量选择 -->
        <div class="control-panel">
            <div class="control-item">
                <label>数据集：</label>
                <select>
                    <option>exp_001.csv</option>
                    <option>uav_trajectory.db</option>
                    <option>radar_data.xlsx</option>
                </select>
            </div>
            <div class="control-item">
                <label>X轴：</label>
                <select id="xAxis">
                    <option>时间</option>
                    <option>经度</option>
                    <option>纬度</option>
                    <option selected>高度</option>
                </select>
            </div>
            <div class="control-item">
                <label>Y轴：</label>
                <select id="yAxis">
                    <option>速度</option>
                    <option selected>高度</option>
                    <option>经度</option>
                    <option>纬度</option>
                </select>
            </div>
            <div class="control-item">
                <label>分组/颜色：</label>
                <select id="groupBy">
                    <option>无</option>
                    <option>无人机类型</option>
                    <option>任务阶段</option>
                </select>
            </div>
        </div>

        <!-- 图表类型工具栏 -->
        <div class="chart-toolbar">
            <div class="chart-type-group">
                <span class="chart-btn active" data-type="bar"><i class="fas fa-chart-bar"></i> 柱状图</span>
                <span class="chart-btn" data-type="line"><i class="fas fa-chart-line"></i> 折线图</span>
                <span class="chart-btn" data-type="scatter"><i class="fas fa-dot-circle"></i> 散点图</span>
                <span class="chart-btn" data-type="pie"><i class="fas fa-chart-pie"></i> 饼图</span>
            </div>
            <span class="btn btn-primary" id="generateBtn"><i class="fas fa-play"></i> 生成图表</span>
        </div>

        <!-- 图表区域 -->
        <div class="chart-panel">
            <div class="chart-header">
                <span><i class="fas fa-chart-bar"></i> 图表预览</span>
                <span><i class="fas fa-download" title="导出图片"></i></span>
            </div>
            <div class="chart-container">
                <div id="mainChart"></div>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="log-panel">
            <div class="progress-bar">
                <div class="progress-fill" style="width:100%;"></div>
            </div>
            <div class="log-box">
                [15:30:45] 加载数据集 exp_001.csv...<br>
                [15:30:46] 生成柱状图: X=高度, Y=频数<br>
                [15:30:47] 图表渲染完成。
            </div>
        </div>
    </div>

    <script>
        const chartDom = document.getElementById('mainChart');
        const myChart = echarts.init(chartDom);

        // 图表类型按钮切换
        const chartBtns = document.querySelectorAll('.chart-btn');
        chartBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                chartBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateChart(btn.dataset.type);
            });
        });

        // 生成按钮点击
        document.getElementById('generateBtn').addEventListener('click', () => {
            const activeType = document.querySelector('.chart-btn.active').dataset.type;
            updateChart(activeType);
        });

        // 更新图表
        function updateChart(type) {
            const xAxis = document.getElementById('xAxis').value;
            const yAxis = document.getElementById('yAxis').value;
            
            if (type === 'bar') {
                myChart.setOption({
                    title: { show: false },
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: ['1000-2000', '2000-3000', '3000-4000', '4000-5000'] },
                    yAxis: { type: 'value', name: '频数' },
                    series: [{
                        type: 'bar',
                        data: [25, 45, 78, 32],
                        itemStyle: { color: '#4a9eff' }
                    }]
                });
            } else if (type === 'line') {
                myChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'category', data: ['10:00', '10:05', '10:10', '10:15', '10:20'] },
                    yAxis: { type: 'value', name: yAxis },
                    series: [{
                        type: 'line',
                        data: [280, 285, 290, 275, 295],
                        smooth: true,
                        lineStyle: { color: '#4a9eff', width: 3 }
                    }]
                });
            } else if (type === 'scatter') {
                myChart.setOption({
                    tooltip: { trigger: 'axis' },
                    xAxis: { type: 'value', name: xAxis },
                    yAxis: { type: 'value', name: yAxis },
                    series: [{
                        type: 'scatter',
                        data: [[3500,280], [3510,282], [3400,275], [3415,277], [3600,290], [3612,292], [3550,285], [3520,280]],
                        symbolSize: 8,
                        itemStyle: { color: '#4a9eff' }
                    }]
                });
            } else if (type === 'pie') {
                myChart.setOption({
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: '60%',
                        data: [
                            { name: '侦察型', value: 45 },
                            { name: '攻击型', value: 78 },
                            { name: '干扰型', value: 32 }
                        ],
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#1a1a2a',
                            borderWidth: 2
                        }
                    }]
                });
            }
        }

        // 初始显示柱状图
        updateChart('bar');
    </script>
</body>
</html>
