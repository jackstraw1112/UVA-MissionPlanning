<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评估指标体系管理 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 工具栏 */
        .toolbar {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .toolbar i {
            font-size: 18px;
            color: #aaa;
            transition: color 0.2s;
            cursor: default;
        }

        .toolbar i:hover {
            color: #4a9eff;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background-color: #444;
            margin: 0 8px;
        }

        .toolbar-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 主布局：左右两列 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧模板树 */
        .left-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .filter-box {
            margin: 12px 16px;
            display: flex;
            align-items: center;
            background-color: #2a2a3c;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 8px;
        }

        .filter-box i {
            color: #aaa;
            margin-right: 6px;
        }

        .filter-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .tree {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .tree li {
            padding: 6px 0;
            color: #bbb;
            cursor: default;
        }

        .tree .folder {
            font-weight: 500;
            color: #ddd;
            margin-top: 8px;
        }

        .tree .folder i {
            width: 20px;
            color: #4a9eff;
        }

        .tree .item {
            margin-left: 24px;
            padding-left: 8px;
            border-left: 1px solid #333;
            transition: background 0.2s;
        }

        .tree .item:hover {
            background-color: #2a2a42;
        }

        .tree .item.selected {
            background-color: #2a2a5a;
            border-left: 2px solid #4a9eff;
            color: white;
        }

        /* 右侧编辑区域 */
        .right-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-header {
            display: flex;
            border-bottom: 1px solid #333;
            background-color: #1e1e2f;
        }

        .tab-item {
            padding: 12px 24px;
            cursor: default;
            color: #aaa;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }

        .tab-item.active {
            color: white;
            border-bottom-color: #4a9eff;
            background-color: #2a2a42;
        }

        .tab-item i {
            margin-right: 8px;
        }

        .tab-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            margin-bottom: 12px;
            align-items: center;
        }

        .form-row label {
            width: 100px;
            color: #aaa;
            font-size: 13px;
        }

        .form-row .value {
            flex: 1;
        }

        input, select, textarea {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .btn-validate {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
            margin-left: 8px;
        }

        .btn-validate:hover {
            background-color: #3a3a5a;
        }

        /* 表格样式 */
        .indicator-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 12px;
        }

        .indicator-table th {
            text-align: left;
            padding: 8px;
            background-color: #2a2a3c;
            color: #aaa;
            font-weight: 400;
            border-bottom: 1px solid #444;
        }

        .indicator-table td {
            padding: 8px;
            border-bottom: 1px solid #2a2a3c;
        }

        .indicator-table tr:hover {
            background-color: #2a2a42;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #4a9eff;
            cursor: default;
            margin: 0 4px;
        }

        .btn-icon:hover {
            color: #7ab9ff;
        }

        .btn-add {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
            margin-top: 12px;
        }

        .btn-add:hover {
            background-color: #3a3a5a;
        }

        /* 底部状态栏 */
        .status-bar {
            background-color: #1a1a2a;
            border-top: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 标签页切换 */
        .tab-item {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-chart-line" style="margin-right: 8px; color: #4a9eff;"></i>评估指标体系管理</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-group">
            <i class="fas fa-file" title="新建模板"></i>
            <i class="fas fa-folder-open" title="打开"></i>
            <i class="fas fa-save" title="保存"></i>
            <i class="fas fa-trash-alt" title="删除"></i>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <i class="fas fa-file-import" title="导入"></i>
            <i class="fas fa-file-export" title="导出"></i>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <i class="fas fa-sync-alt" title="刷新"></i>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧模板树 -->
        <div class="left-panel">
            <div class="panel-header">
                <h3><i class="fas fa-folder-tree" style="margin-right: 6px; color:#4a9eff;"></i>指标体系模板</h3>
            </div>
            <div class="filter-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="过滤模板/指标...">
            </div>
            <ul class="tree">
                <li class="folder"><i class="fas fa-folder-open"></i> 反辐射攻击模板</li>
                <li class="item selected"><i class="fas fa-cube"></i> 目标摧毁概率</li>
                <li class="item"><i class="fas fa-cube"></i> 无人机生存率</li>
                
                <li class="folder" style="margin-top:12px;"><i class="fas fa-folder-open"></i> 协同压制模板</li>
                <li class="item"><i class="fas fa-cube"></i> 压制时间</li>
                <li class="item"><i class="fas fa-cube"></i> 干扰成功率</li>
                
                <li class="folder" style="margin-top:12px;"><i class="fas fa-folder-open"></i> 区域侦察模板</li>
                <li class="item"><i class="fas fa-cube"></i> 侦察覆盖率</li>
                <li class="item"><i class="fas fa-cube"></i> 目标发现概率</li>
            </ul>
        </div>

        <!-- 右侧编辑区域 -->
        <div class="right-panel">
            <div class="tab-header">
                <div class="tab-item active" data-tab="indicator"><i class="fas fa-cube"></i> 指标属性</div>
                <div class="tab-item" data-tab="template"><i class="fas fa-layer-group"></i> 模板属性</div>
            </div>
            <div class="tab-content">
                <!-- 指标编辑页 -->
                <div class="tab-pane active" id="tab-indicator">
                    <div class="form-group">
                        <div class="form-row">
                            <label>指标名称</label>
                            <div class="value"><input type="text" value="目标摧毁概率" placeholder="唯一标识，如 kill_prob"></div>
                        </div>
                        <div class="form-row">
                            <label>描述</label>
                            <div class="value"><textarea rows="2">反辐射无人机摧毁目标的概率</textarea></div>
                        </div>
                        <div class="form-row">
                            <label>单位</label>
                            <div class="value"><input type="text" value="%"></div>
                        </div>
                        <div class="form-row">
                            <label>计算公式</label>
                            <div class="value" style="display: flex; gap: 8px;">
                                <input type="text" value="kills / total_targets * 100" style="flex:1;">
                                <span class="btn-validate"><i class="fas fa-check"></i> 验证</span>
                            </div>
                        </div>
                        <div class="form-row">
                            <label>权重</label>
                            <div class="value" style="display: flex; gap: 8px; align-items: center;">
                                <input type="range" min="0" max="1" step="0.05" value="0.4" style="flex:1;">
                                <span style="min-width:40px;">0.40</span>
                            </div>
                        </div>
                        <div class="form-row">
                            <label>适用场景</label>
                            <div class="value">
                                <select>
                                    <option>反辐射攻击</option>
                                    <option>协同压制</option>
                                    <option>区域侦察</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 模板编辑页 -->
                <div class="tab-pane" id="tab-template">
                    <div class="form-group">
                        <div class="form-row">
                            <label>模板名称</label>
                            <div class="value"><input type="text" value="反辐射攻击模板"></div>
                        </div>
                        <div class="form-row">
                            <label>描述</label>
                            <div class="value"><textarea rows="2">反辐射攻击作战效能评估指标体系</textarea></div>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <label style="color:#aaa;">包含的指标：</label>
                        <table class="indicator-table">
                            <thead>
                                <tr>
                                    <th>指标名称</th>
                                    <th>权重</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>目标摧毁概率</td>
                                    <td>
                                        <input type="range" min="0" max="1" step="0.05" value="0.4" style="width:80px;">
                                        <span style="margin-left:4px;">0.40</span>
                                    </td>
                                    <td>
                                        <i class="fas fa-edit btn-icon" title="编辑"></i>
                                        <i class="fas fa-trash-alt btn-icon" title="移除"></i>
                                    </td>
                                </tr>
                                <tr>
                                    <td>无人机生存率</td>
                                    <td>
                                        <input type="range" min="0" max="1" step="0.05" value="0.3" style="width:80px;">
                                        <span style="margin-left:4px;">0.30</span>
                                    </td>
                                    <td>
                                        <i class="fas fa-edit btn-icon" title="编辑"></i>
                                        <i class="fas fa-trash-alt btn-icon" title="移除"></i>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="btn-add"><i class="fas fa-plus"></i> 添加指标...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div>
            <span><i class="fas fa-database"></i> 指标库: 23个指标</span>
            <span style="margin-left:16px;"><i class="fas fa-layer-group"></i> 模板: 5个</span>
        </div>
        <div>
            <span>就绪</span>
        </div>
    </div>

    <!-- 标签页切换脚本 -->
    <script>
        const tabItems = document.querySelectorAll('.tab-item');
        const panes = document.querySelectorAll('.tab-pane');

        tabItems.forEach(item => {
            item.addEventListener('click', function(e) {
                const target = this.getAttribute('data-tab');
                // 移除所有active
                tabItems.forEach(t => t.classList.remove('active'));
                panes.forEach(p => p.classList.remove('active'));
                // 添加当前active
                this.classList.add('active');
                document.getElementById('tab-' + target).classList.add('active');
            });
        });
    </script>
</body>
</html>
