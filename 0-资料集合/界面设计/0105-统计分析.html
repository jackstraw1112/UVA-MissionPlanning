<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 数据源和变量卡片 */
        .card {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: #ccc;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .variable-list {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .variable-item {
            background-color: #2a2a3c;
            border: 1px solid #444;
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 13px;
            cursor: default;
        }

        .variable-item.selected {
            background-color: #2a2a5a;
            border-color: #4a9eff;
            color: white;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #aaa;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        /* 结果区域 */
        .results-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .table-wrapper {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            flex: 1;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background-color: #2a2a3c;
            color: #ccc;
            font-weight: 400;
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        td {
            padding: 6px 8px;
            border-bottom: 1px solid #2a2a3c;
        }

        tr:hover {
            background-color: #2a2a42;
        }

        .chart-wrapper {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            height: 280px;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .progress-bar {
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #6f4aff);
        }

        .log-box {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            height: 60px;
            overflow-y: auto;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-chart-bar" style="margin-right:8px; color:#4a9eff;"></i>统计分析</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 数据源 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-database" style="color:#4a9eff;"></i> 数据源
            </div>
            <div class="row">
                <select style="background:#2a2a3c; border:1px solid #444; color:white; padding:6px; border-radius:4px; min-width:200px;">
                    <option>试验数据_001</option>
                    <option>仿真结果_002</option>
                </select>
            </div>
        </div>

        <!-- 变量选择 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list" style="color:#4a9eff;"></i> 分析变量
            </div>
            <div class="variable-list">
                <span class="variable-item selected">经度</span>
                <span class="variable-item selected">纬度</span>
                <span class="variable-item">高度</span>
                <span class="variable-item selected">速度</span>
                <span class="variable-item">航向角</span>
            </div>
        </div>

        <!-- 分析选项 -->
        <div class="card">
            <div class="row" style="justify-content: space-between;">
                <div class="radio-group">
                    <label><input type="radio" name="analysisType" checked> 描述性统计</label>
                    <label><input type="radio" name="analysisType"> 相关性分析</label>
                </div>
                <div>
                    <label><input type="checkbox" checked> 自动可视化</label>
                    <span class="btn btn-primary" style="margin-left:16px;"><i class="fas fa-play"></i> 执行分析</span>
                </div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="results-container">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>变量</th>
                            <th>均值</th>
                            <th>标准差</th>
                            <th>最小值</th>
                            <th>中位数</th>
                            <th>最大值</th>
                            <th>偏度</th>
                            <th>峰度</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>经度</td><td>125.32</td><td>2.14</td><td>118.90</td><td>125.18</td><td>150.20</td><td>0.32</td><td>2.18</td></tr>
                        <tr><td>纬度</td><td>78.23</td><td>8.56</td><td>65.23</td><td>78.56</td><td>95.30</td><td>-0.15</td><td>1.95</td></tr>
                        <tr><td>速度</td><td>145.2</td><td>78.3</td><td>0.0</td><td>155.0</td><td>292.0</td><td>-0.42</td><td>2.33</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="chart-wrapper">
                <div id="chart"></div>
            </div>
        </div>

        <!-- 进度和日志 -->
        <div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:65%;"></div>
            </div>
            <div class="log-box">
                [15:30:45] 开始分析，数据集：试验数据_001<br>
                [15:30:46] 计算描述性统计...<br>
                [15:30:48] 生成直方图...<br>
                [15:30:50] 分析完成。
            </div>
        </div>
    </div>

    <script>
        // 示例 ECharts 图表（直方图）
        var chart = echarts.init(document.getElementById('chart'));
        var option = {
            title: { show: false },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: ['经度', '纬度', '速度'], name: '变量' },
            yAxis: { type: 'value', name: '数值' },
            series: [
                { name: '均值', type: 'bar', data: [125.32, 78.23, 145.2] },
                { name: '中位数', type: 'bar', data: [125.18, 78.56, 155.0] }
            ],
            backgroundColor: 'transparent',
            textStyle: { color: '#ccc' },
            legend: { textStyle: { color: '#ccc' } }
        };
        chart.setOption(option);
    </script>
</body>
</html>
