<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>态势回放 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧事件列表 */
        .left-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .filter-box {
            margin: 12px 16px;
            display: flex;
            align-items: center;
            background-color: #2a2a3c;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 8px;
        }

        .filter-box i {
            color: #aaa;
            margin-right: 6px;
        }

        .filter-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .event-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background-color: #2a2a3c;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: default;
            transition: background 0.2s;
        }

        .event-item:hover {
            background-color: #3a3a5a;
        }

        .event-time {
            color: #4a9eff;
            font-size: 12px;
            min-width: 70px;
        }

        .event-desc {
            font-size: 13px;
            margin-left: 8px;
            color: #ccc;
        }

        .event-icon {
            width: 24px;
            text-align: center;
            color: #ffaa00;
        }

        /* 中央三维视图区域 */
        .center-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .view-3d {
            flex: 1;
            background-color: #0a1a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
            position: relative;
        }

        .view-3d canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .view-3d-placeholder {
            text-align: center;
        }

        .view-3d-placeholder i {
            font-size: 48px;
            color: #333;
            margin-bottom: 16px;
        }

        /* 底部控制条 */
        .control-bar {
            background-color: #1a1a2a;
            border-top: 1px solid #333;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn i {
            color: #4a9eff;
        }

        .speed-selector {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
        }

        .time-label {
            color: #aaa;
            font-size: 13px;
        }

        .slider-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            appearance: none;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4a9eff;
            border-radius: 50%;
            cursor: default;
        }

        .separator {
            width: 1px;
            height: 24px;
            background-color: #444;
            margin: 0 8px;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-history" style="margin-right: 8px; color: #4a9eff;"></i>态势回放</h2>
        <div>
            <i class="fas fa-folder-open" title="打开回放数据"></i>
            <i class="fas fa-save" title="保存当前画面"></i>
            <i class="fas fa-cog" title="设置"></i>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧事件列表 -->
        <div class="left-panel">
            <div class="panel-header">
                <h3><i class="fas fa-list" style="margin-right: 6px; color:#4a9eff;"></i>事件列表</h3>
                <span>共 12 个事件</span>
            </div>
            <div class="filter-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="过滤事件...">
            </div>
            <ul class="event-list">
                <li class="event-item">
                    <span class="event-time">12:34:56</span>
                    <span class="event-icon"><i class="fas fa-rocket"></i></span>
                    <span class="event-desc">导弹发射 (UAV-001 → RAD-01)</span>
                </li>
                <li class="event-item">
                    <span class="event-time">12:35:02</span>
                    <span class="event-icon"><i class="fas fa-satellite-dish"></i></span>
                    <span class="event-desc">雷达开机 (RAD-01)</span>
                </li>
                <li class="event-item">
                    <span class="event-time">12:35:23</span>
                    <span class="event-icon"><i class="fas fa-bullseye"></i></span>
                    <span class="event-desc">目标跟踪 (SAM-01 跟踪 UAV-001)</span>
                </li>
                <li class="event-item">
                    <span class="event-time">12:35:47</span>
                    <span class="event-icon"><i class="fas fa-explosion"></i></span>
                    <span class="event-desc">目标命中 (UAV-001 摧毁 RAD-01)</span>
                </li>
                <li class="event-item">
                    <span class="event-time">12:36:12</span>
                    <span class="event-icon"><i class="fas fa-shield-alt"></i></span>
                    <span class="event-desc">防空导弹发射 (SAM-01 → UAV-001)</span>
                </li>
                <li class="event-item">
                    <span class="event-time">12:36:45</span>
                    <span class="event-icon"><i class="fas fa-plane"></i></span>
                    <span class="event-desc">UAV-002 进入交战区域</span>
                </li>
            </ul>
        </div>

        <!-- 中央三维视图 -->
        <div class="center-panel">
            <div class="view-3d">
                <!-- 占位画布，实际开发由三维引擎渲染 -->
                <canvas id="canvas" width="800" height="600" style="width:100%; height:100%; background: linear-gradient(to bottom, #0a1a2a, #1a3a4a);"></canvas>
                <!-- 简单的网格线占位（仅示意） -->
                <div class="view-3d-placeholder" style="position: absolute; pointer-events: none; color:#555;">
                    <i class="fas fa-cube"></i>
                    <p>三维态势回放视图</p>
                </div>
            </div>
            <!-- 当前时间标注（可选） -->
            <div style="position: absolute; bottom: 80px; left: 320px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #4a9eff;">
                当前时间: 12:35:23
            </div>
        </div>
    </div>

    <!-- 底部控制条 -->
    <div class="control-bar">
        <div class="btn"><i class="fas fa-play"></i> 播放</div>
        <div class="btn"><i class="fas fa-pause"></i> 暂停</div>
        <div class="btn"><i class="fas fa-stop"></i> 停止</div>
        <div class="separator"></div>
        <div class="btn"><i class="fas fa-step-backward"></i></div>
        <div class="btn"><i class="fas fa-step-forward"></i></div>
        <div class="separator"></div>
        <select class="speed-selector">
            <option>0.5x</option>
            <option selected>1x</option>
            <option>2x</option>
            <option>4x</option>
            <option>8x</option>
            <option>16x</option>
            <option>32x</option>
        </select>
        <span class="time-label">12:35:23 / 01:00:00</span>
        <div class="slider-container">
            <span>00:00</span>
            <input type="range" min="0" max="100" value="58" class="slider">
            <span>01:00</span>
        </div>
    </div>

    <!-- 简单脚本：绘制占位网格线（仅示意） -->
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        ctx.strokeStyle = '#2a5a7a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 40, 0);
            ctx.lineTo(i * 40, canvas.height);
            ctx.strokeStyle = '#2a5a7a';
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * 40);
            ctx.lineTo(canvas.width, i * 40);
            ctx.stroke();
        }
        // 绘制几个小三角形代表无人机
        ctx.fillStyle = '#4a9eff';
        ctx.beginPath();
        ctx.moveTo(200, 150);
        ctx.lineTo(180, 170);
        ctx.lineTo(220, 170);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.moveTo(300, 200);
        ctx.lineTo(280, 220);
        ctx.lineTo(320, 220);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ff5555';
        ctx.beginPath();
        ctx.moveTo(400, 300);
        ctx.lineTo(380, 320);
        ctx.lineTo(420, 320);
        ctx.closePath();
        ctx.fill();
    </script>
</body>
</html>
