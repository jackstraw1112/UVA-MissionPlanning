<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型构建 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 通用卡片样式 */
        .card {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }

        .card-title {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* 数据源与变量 */
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }

        .form-row label {
            width: 100px;
            color: #aaa;
            font-size: 13px;
        }

        .form-row select, .form-row input {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            flex: 1;
        }

        .variable-list {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .variable-list label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
        }

        .variable-list input {
            margin-right: 6px;
        }

        /* 算法参数区域 */
        .param-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .param-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-item label {
            color: #aaa;
            font-size: 12px;
        }

        .param-item input, .param-item select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px;
            border-radius: 4px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
        }

        /* 训练控制 */
        .train-control {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        .btn i {
            color: #4a9eff;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #6f4aff);
        }

        /* 验证指标 */
        .metrics-panel {
            display: flex;
            gap: 40px;
            background-color: #222236;
            border-radius: 6px;
            padding: 12px 20px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .metric-label {
            color: #aaa;
            font-size: 12px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #4a9eff;
        }

        /* 图表区域 */
        .chart-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
        }

        .chart-header {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .chart-tab {
            background-color: #222236;
            border: 1px solid #333;
            padding: 4px 12px;
            border-radius: 4px;
            color: #aaa;
            cursor: default;
        }

        .chart-tab.active {
            background-color: #2a2a5a;
            color: white;
            border-color: #4a9eff;
        }

        .chart-container {
            height: 200px;
        }

        /* 模型导出 */
        .export-panel {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .export-panel input {
            flex: 1;
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
        }

        .log-box {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            height: 60px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-cube" style="margin-right:8px; color:#4a9eff;"></i>模型构建</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 数据源与变量 -->
        <div class="card">
            <div class="card-title"><i class="fas fa-database"></i> 数据源与变量</div>
            <div class="grid-2col">
                <div>
                    <div class="form-row">
                        <label>数据集：</label>
                        <select>
                            <option>exp_001.csv (飞行数据)</option>
                            <option>radar_measurements.db</option>
                            <option>uav_dynamics.xlsx</option>
                        </select>
                    </div>
                </div>
                <div></div>
                <div>
                    <div class="form-row">
                        <label>输入变量：</label>
                        <div class="variable-list">
                            <label><input type="checkbox" checked> 油门开度</label>
                            <label><input type="checkbox" checked> 升降舵偏角</label>
                            <label><input type="checkbox" checked> 副翼偏角</label>
                            <label><input type="checkbox"> 方向舵偏角</label>
                            <label><input type="checkbox"> 空速</label>
                            <label><input type="checkbox"> 高度</label>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="form-row">
                        <label>输出变量：</label>
                        <select>
                            <option>俯仰角速率</option>
                            <option>滚转角速率</option>
                            <option>偏航角速率</option>
                            <option>迎角</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 模型类型与算法 -->
        <div class="card">
            <div class="card-title"><i class="fas fa-cog"></i> 模型类型与算法</div>
            <div class="grid-2col">
                <div class="form-row">
                    <label>模型类型：</label>
                    <select>
                        <option>运动学模型</option>
                        <option>动力学模型</option>
                        <option>传感器模型</option>
                        <option>目标特性模型</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>算法：</label>
                    <select id="algorithm">
                        <option>线性回归</option>
                        <option>多项式拟合 (阶数可设)</option>
                        <option>神经网络 (BP)</option>
                        <option>支持向量机回归</option>
                        <option>ARX系统辨识</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 算法参数 -->
        <div class="card">
            <div class="card-title"><i class="fas fa-sliders-h"></i> 算法参数</div>
            <div class="param-grid">
                <div class="param-item">
                    <label>训练集比例</label>
                    <input type="number" value="0.7" step="0.05" min="0.1" max="0.9">
                </div>
                <div class="param-item">
                    <label>多项式阶数</label>
                    <input type="number" value="2" min="1" max="10">
                </div>
                <div class="param-item">
                    <label>隐藏层神经元</label>
                    <input type="text" value="64,32">
                </div>
                <div class="param-item">
                    <label>迭代次数</label>
                    <input type="number" value="500" step="50">
                </div>
                <div class="param-item">
                    <label>正则化系数 C</label>
                    <input type="number" value="1.0" step="0.1">
                </div>
                <div class="param-item">
                    <label>ε</label>
                    <input type="number" value="0.1" step="0.01">
                </div>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" checked> <span>数据标准化</span>
            </div>
        </div>

        <!-- 训练控制 -->
        <div class="card">
            <div class="train-control">
                <span class="btn btn-primary"><i class="fas fa-play"></i> 开始训练</span>
                <span class="btn"><i class="fas fa-stop"></i> 停止</span>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:65%;"></div>
                </div>
            </div>
        </div>

        <!-- 验证指标 -->
        <div class="card">
            <div class="card-title"><i class="fas fa-check-circle"></i> 模型验证</div>
            <div class="metrics-panel">
                <div class="metric-item">
                    <span class="metric-label">R²</span>
                    <span class="metric-value">0.956</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">RMSE</span>
                    <span class="metric-value">0.023</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label">MAE</span>
                    <span class="metric-value">0.018</span>
                </div>
            </div>
        </div>

        <!-- 拟合效果图表 -->
        <div class="chart-panel">
            <div class="chart-header">
                <span class="chart-tab active">预测 vs 真实</span>
                <span class="chart-tab">残差图</span>
            </div>
            <div class="chart-container" id="fitChart"></div>
        </div>

        <!-- 模型导出 -->
        <div class="card">
            <div class="card-title"><i class="fas fa-file-export"></i> 模型导出</div>
            <div class="export-panel">
                <span class="btn"><i class="fas fa-save"></i> 保存模型</span>
                <input type="text" placeholder="模型名称（如 uav_dynamics_v1）" value="uav_pitch_model_v1">
            </div>
            <div class="log-box">
                [15:30:45] 训练开始，算法：神经网络，迭代 500 次<br>
                [15:31:30] 训练完成，验证 R² = 0.956<br>
                [15:31:32] 模型已保存至模型库
            </div>
        </div>
    </div>

    <script>
        // 初始化拟合效果图
        const fitChart = echarts.init(document.getElementById('fitChart'));
        fitChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'value', name: '真实值' },
            yAxis: { type: 'value', name: '预测值' },
            series: [{
                type: 'scatter',
                data: [[0.1,0.12], [0.2,0.19], [0.3,0.31], [0.4,0.42], [0.5,0.48], [0.6,0.62], [0.7,0.71], [0.8,0.79]],
                symbolSize: 8,
                itemStyle: { color: '#4a9eff' }
            }, {
                type: 'line',
                data: [[0,0], [1,1]],
                lineStyle: { color: '#ffaa00', type: 'dashed' }
            }]
        });

        // 简单的标签切换（演示）
        document.querySelectorAll('.chart-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // 这里可切换图表数据，为简化演示略
            });
        });
    </script>
</body>
</html>
