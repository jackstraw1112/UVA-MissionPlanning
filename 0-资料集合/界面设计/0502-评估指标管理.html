<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评估指标管理 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 工具栏 */
        .toolbar {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar i {
            font-size: 18px;
            color: #aaa;
            transition: color 0.2s;
            cursor: default;
        }

        .toolbar i:hover {
            color: #4a9eff;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background-color: #444;
            margin: 0 8px;
        }

        .toolbar-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 主布局：左右中三列 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧指标库 */
        .left-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .filter-box {
            margin: 12px 16px;
            display: flex;
            align-items: center;
            background-color: #2a2a3c;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px 8px;
        }

        .filter-box i {
            color: #aaa;
            margin-right: 6px;
        }

        .filter-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .indicator-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .indicator-list li {
            padding: 10px 12px;
            background-color: #2a2a3c;
            border-radius: 4px;
            margin-bottom: 6px;
            cursor: grab;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .indicator-list li:hover {
            background-color: #3a3a5a;
        }

        .indicator-list li i {
            color: #4a9eff;
            width: 20px;
            text-align: center;
        }

        /* 中央画布区 */
        .canvas-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .canvas-toolbar {
            padding: 8px 12px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            gap: 8px;
        }

        .canvas-toolbar i {
            color: #aaa;
            padding: 4px;
            border-radius: 4px;
            cursor: default;
        }

        .canvas-toolbar i:hover {
            background-color: #3a3a5a;
        }

        .canvas-container {
            flex: 1;
            background-image: 
                linear-gradient(rgba(74, 158, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 158, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: auto;
        }

        .canvas-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 右侧属性面板 */
        .right-panel {
            width: 280px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .prop-section {
            border-bottom: 1px solid #333;
            padding: 16px;
        }

        .prop-section:last-child {
            border-bottom: none;
        }

        .prop-section h4 {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .prop-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .prop-row label {
            color: #aaa;
        }

        .prop-row input, .prop-row select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 140px;
        }

        .prop-row input[type="range"] {
            width: 100px;
        }

        /* 底部状态栏 */
        .status-bar {
            background-color: #1a1a2a;
            border-top: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-sitemap" style="margin-right: 8px; color: #4a9eff;"></i>评估指标管理</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-group">
            <i class="fas fa-file" title="新建指标体系"></i>
            <i class="fas fa-folder-open" title="打开"></i>
            <i class="fas fa-save" title="保存"></i>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <i class="fas fa-check-circle" title="验证"></i>
            <i class="fas fa-arrows-alt" title="自动布局"></i>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <i class="fas fa-search-plus" title="放大"></i>
            <i class="fas fa-search-minus" title="缩小"></i>
            <i class="fas fa-expand-arrows-alt" title="适应窗口"></i>
        </div>
        <div style="flex:1"></div>
        <span style="color:#aaa;">指标体系：反辐射攻击效能</span>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧指标库 -->
        <div class="left-panel">
            <div class="panel-header">
                <h3><i class="fas fa-database" style="margin-right: 6px; color:#4a9eff;"></i>指标库</h3>
                <span>12个指标</span>
            </div>
            <div class="filter-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索指标...">
            </div>
            <ul class="indicator-list">
                <li><i class="fas fa-cube"></i> 目标摧毁概率</li>
                <li><i class="fas fa-cube"></i> 无人机生存率</li>
                <li><i class="fas fa-cube"></i> 压制时间</li>
                <li><i class="fas fa-cube"></i> 干扰成功率</li>
                <li><i class="fas fa-cube"></i> 侦察覆盖率</li>
                <li><i class="fas fa-cube"></i> 目标发现概率</li>
                <li><i class="fas fa-cube"></i> 导弹命中率</li>
                <li><i class="fas fa-cube"></i> 雷达探测距离</li>
            </ul>
        </div>

        <!-- 中央画布区 -->
        <div class="canvas-panel">
            <div class="canvas-toolbar">
                <i class="fas fa-mouse-pointer" title="选择"></i>
                <i class="fas fa-arrow-pointer" title="连线"></i>
                <i class="fas fa-undo" title="撤销"></i>
                <i class="fas fa-redo" title="重做"></i>
                <i class="fas fa-trash-alt" title="删除"></i>
                <div style="flex:1"></div>
                <i class="fas fa-expand" title="全屏"></i>
            </div>
            <div class="canvas-container">
                <!-- 使用SVG绘制指标体系示例 -->
                <svg class="canvas-svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet">
                    <!-- 定义箭头标记 -->
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                            <polygon points="0 0, 10 5, 0 10" fill="#4a9eff" />
                        </marker>
                    </defs>
                    <!-- 连接线 (父子关系) -->
                    <line x1="300" y1="80" x2="200" y2="200" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3" />
                    <line x1="300" y1="80" x2="400" y2="200" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3" />
                    
                    <!-- 线上权重标签 -->
                    <text x="230" y="140" fill="#ccc" font-size="12" background="black">0.6</text>
                    <text x="350" y="140" fill="#ccc" font-size="12">0.4</text>

                    <!-- 节点：综合效能 -->
                    <rect x="250" y="30" width="100" height="40" rx="8" fill="#2a2a5a" stroke="#4a9eff" stroke-width="2" />
                    <text x="300" y="55" fill="white" font-size="14" text-anchor="middle" dominant-baseline="middle">综合效能</text>
                    
                    <!-- 节点：目标摧毁概率 -->
                    <rect x="150" y="180" width="120" height="40" rx="8" fill="#2a2a42" stroke="#4a9eff" stroke-width="1" />
                    <text x="210" y="200" fill="white" font-size="12" text-anchor="middle">目标摧毁概率</text>
                    <text x="210" y="215" fill="#aaa" font-size="10" text-anchor="middle">权重 0.6</text>

                    <!-- 节点：无人机生存率 -->
                    <rect x="350" y="180" width="120" height="40" rx="8" fill="#2a2a42" stroke="#4a9eff" stroke-width="1" />
                    <text x="410" y="200" fill="white" font-size="12" text-anchor="middle">无人机生存率</text>
                    <text x="410" y="215" fill="#aaa" font-size="10" text-anchor="middle">权重 0.4</text>

                    <!-- 额外节点示例：弹药消耗 -->
                    <rect x="80" y="280" width="100" height="40" rx="8" fill="#2a2a42" stroke="#aaa" stroke-width="1" />
                    <text x="130" y="300" fill="white" font-size="12" text-anchor="middle">弹药消耗</text>
                    
                    <rect x="420" y="280" width="100" height="40" rx="8" fill="#2a2a42" stroke="#aaa" stroke-width="1" />
                    <text x="470" y="300" fill="white" font-size="12" text-anchor="middle">任务时间</text>
                </svg>
            </div>
        </div>

        <!-- 右侧属性面板 -->
        <div class="right-panel">
            <div class="prop-section">
                <h4><i class="fas fa-cube" style="margin-right: 6px; color:#4a9eff;"></i>节点属性</h4>
                <div class="prop-row">
                    <label>名称</label>
                    <input type="text" value="目标摧毁概率">
                </div>
                <div class="prop-row">
                    <label>权重</label>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <input type="range" min="0" max="1" step="0.05" value="0.6" style="width:100px;">
                        <span style="width:40px;">0.60</span>
                    </div>
                </div>
                <div class="prop-row">
                    <label>计算公式</label>
                    <input type="text" value="kills / total">
                </div>
            </div>
            <div class="prop-section">
                <h4><i class="fas fa-link" style="margin-right: 6px; color:#4a9eff;"></i>连线属性</h4>
                <div class="prop-row">
                    <label>关系类型</label>
                    <select>
                        <option>父子关系</option>
                        <option>依赖关系</option>
                    </select>
                </div>
                <div class="prop-row">
                    <label>权重</label>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <input type="range" min="0" max="1" step="0.05" value="0.6" style="width:100px;">
                        <span>0.60</span>
                    </div>
                </div>
            </div>
            <div class="prop-section">
                <h4><i class="fas fa-exclamation-triangle" style="margin-right: 6px; color:#ffaa00;"></i>验证结果</h4>
                <div style="color:#4caf50;"><i class="fas fa-check-circle"></i> 无循环依赖</div>
                <div style="color:#ffaa00;"><i class="fas fa-exclamation-triangle"></i> 孤立节点: 2个</div>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div>
            <span><i class="fas fa-check-circle" style="color:#4caf50;"></i> 验证通过</span>
            <span style="margin-left:16px;"><i class="fas fa-cube"></i> 节点: 5</span>
            <span style="margin-left:16px;"><i class="fas fa-link"></i> 连线: 2</span>
        </div>
        <div>
            <span>就绪</span>
        </div>
    </div>
</body>
</html>
