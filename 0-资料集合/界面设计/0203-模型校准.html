<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型校准 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow: hidden;
            gap: 16px;
        }

        /* 选择面板 */
        .selection-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .selection-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selection-item label {
            color: #aaa;
            font-size: 13px;
        }

        .selection-item select, .selection-item input {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            min-width: 200px;
        }

        .btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: default;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #3a3a5a;
        }

        .btn-primary {
            background-color: #2a2a5a;
            border-color: #4a9eff;
        }

        .btn i {
            color: #4a9eff;
        }

        /* 优化参数网格 */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }

        .param-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .param-item label {
            color: #aaa;
            font-size: 12px;
        }

        .param-item input, .param-item select {
            background-color: #2a2a3c;
            border: 1px solid #444;
            color: white;
            padding: 6px;
            border-radius: 4px;
        }

        /* 校准过程 */
        .progress-panel {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #aaa;
        }

        .progress-bar {
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a9eff, #6f4aff);
        }

        .chart-container {
            height: 100px;
            width: 100%;
        }

        /* 校准结果 */
        .results-panel {
            display: flex;
            gap: 16px;
        }

        .metrics-card {
            width: 200px;
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
        }

        .metric-label {
            color: #aaa;
            font-size: 13px;
        }

        .metric-value {
            color: #4a9eff;
            font-weight: 600;
        }

        .improvement {
            color: #4caf50;
        }

        .chart-card {
            flex: 1;
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
        }

        /* 参数表格 */
        .params-table {
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background-color: #2a2a3c;
            color: #ccc;
            font-weight: 400;
            padding: 8px;
            text-align: left;
        }

        td {
            padding: 6px 8px;
            border-bottom: 1px solid #333;
        }

        tr:hover {
            background-color: #2a2a42;
        }

        /* 底部按钮 */
        .bottom-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-sliders-h" style="margin-right:8px; color:#4a9eff;"></i>模型校准</h2>
        <div>
            <i class="fas fa-question-circle" title="帮助"></i>
            <i class="fas fa-user" title="用户"></i>
        </div>
    </div>

    <div class="main-container">
        <!-- 模型与数据选择 -->
        <div class="selection-panel">
            <div class="selection-item">
                <label><i class="fas fa-cube"></i> 选择模型：</label>
                <select>
                    <option>uav_dynamics_v1 (线性回归)</option>
                    <option>uav_dynamics_v2 (多项式拟合)</option>
                    <option>seeker_model_v1 (神经网络)</option>
                </select>
            </div>
            <div class="selection-item">
                <label><i class="fas fa-database"></i> 校准数据集：</label>
                <select>
                    <option>flight_test_001.csv</option>
                    <option>wind_tunnel_data.db</option>
                    <option>seeker_test_data.xlsx</option>
                </select>
            </div>
            <span class="btn btn-primary"><i class="fas fa-play"></i> 开始校准</span>
        </div>

        <!-- 优化算法与参数 -->
        <div class="params-grid">
            <div class="param-item">
                <label>优化算法</label>
                <select>
                    <option>梯度下降 (带动量)</option>
                    <option>遗传算法</option>
                    <option>粒子群优化</option>
                    <option>贝叶斯优化</option>
                </select>
            </div>
            <div class="param-item">
                <label>最大迭代</label>
                <input type="number" value="500" step="10">
            </div>
            <div class="param-item">
                <label>收敛容差</label>
                <input type="number" value="0.0001" step="0.0001">
            </div>
            <div class="param-item">
                <label>学习率</label>
                <input type="number" value="0.01" step="0.001">
            </div>
            <div class="param-item">
                <label>种群大小</label>
                <input type="number" value="50" step="5">
            </div>
            <div class="param-item">
                <label>变异率</label>
                <input type="number" value="0.1" step="0.01">
            </div>
        </div>

        <!-- 校准过程监控 -->
        <div class="progress-panel">
            <div class="progress-header">
                <span>当前迭代: 328/500</span>
                <span>当前误差: 0.0234</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:65%;"></div>
            </div>
            <div id="convergenceChart" class="chart-container"></div>
        </div>

        <!-- 校准结果对比 -->
        <div class="results-panel">
            <div class="metrics-card">
                <div class="metric-row">
                    <span class="metric-label">校准前 MSE</span>
                    <span class="metric-value">0.156</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">校准后 MSE</span>
                    <span class="metric-value">0.023</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">提升</span>
                    <span class="metric-value improvement">85.3%</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">校准前 MAE</span>
                    <span class="metric-value">0.312</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">校准后 MAE</span>
                    <span class="metric-value">0.118</span>
                </div>
            </div>
            <div class="chart-card">
                <div id="resultChart" style="height:100%; width:100%;"></div>
            </div>
        </div>

        <!-- 参数对比表 -->
        <div class="params-table">
            <table>
                <thead>
                    <tr>
                        <th>参数名</th>
                        <th>校准前</th>
                        <th>校准后</th>
                        <th>变化率(%)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>升力系数</td>
                        <td>0.85</td>
                        <td>0.92</td>
                        <td>+8.2%</td>
                    </tr>
                    <tr>
                        <td>阻力系数</td>
                        <td>0.12</td>
                        <td>0.11</td>
                        <td>-8.3%</td>
                    </tr>
                    <tr>
                        <td>俯仰力矩系数</td>
                        <td>0.35</td>
                        <td>0.38</td>
                        <td>+8.6%</td>
                    </tr>
                    <tr>
                        <td>发动机推力系数</td>
                        <td>0.95</td>
                        <td>0.98</td>
                        <td>+3.2%</td>
                    </tr>
                    <tr>
                        <td>导引头灵敏度</td>
                        <td>-85.0</td>
                        <td>-82.5</td>
                        <td>+2.9%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 底部按钮 -->
        <div class="bottom-bar">
            <span class="btn"><i class="fas fa-check"></i> 应用校准后模型</span>
            <span class="btn"><i class="fas fa-file-pdf"></i> 导出校准报告</span>
            <span class="btn">关闭</span>
        </div>
    </div>

    <script>
        // 收敛曲线
        const convChart = echarts.init(document.getElementById('convergenceChart'));
        convChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', name: '迭代次数', data: Array.from({length:20}, (_,i)=>i*25) },
            yAxis: { type: 'value', name: '误差' },
            series: [{
                type: 'line',
                data: [0.156, 0.132, 0.115, 0.098, 0.085, 0.074, 0.065, 0.058, 0.052, 0.047, 0.043, 0.039, 0.036, 0.033, 0.031, 0.029, 0.027, 0.025, 0.024, 0.023],
                smooth: true,
                lineStyle: { color: '#4a9eff', width: 2 }
            }]
        });

        // 结果对比图（真实值 vs 预测值）
        const resultChart = echarts.init(document.getElementById('resultChart'));
        resultChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'value', name: '真实值' },
            yAxis: { type: 'value', name: '预测值' },
            series: [
                {
                    type: 'scatter',
                    name: '校准前',
                    data: [[0.1,0.15], [0.2,0.23], [0.3,0.35], [0.4,0.45], [0.5,0.55], [0.6,0.58], [0.7,0.72], [0.8,0.85]],
                    symbolSize: 6,
                    itemStyle: { color: '#ffaa00' }
                },
                {
                    type: 'scatter',
                    name: '校准后',
                    data: [[0.1,0.11], [0.2,0.21], [0.3,0.31], [0.4,0.41], [0.5,0.52], [0.6,0.62], [0.7,0.73], [0.8,0.83]],
                    symbolSize: 6,
                    itemStyle: { color: '#4a9eff' }
                },
                {
                    type: 'line',
                    name: '理想线',
                    data: [[0,0], [1,1]],
                    lineStyle: { color: '#aaa', type: 'dashed' }
                }
            ]
        });
    </script>
</body>
</html>
