<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效果显示 - 反辐射无人机仿真系统</title>
    <!-- Font Awesome 6 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f17;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 标题栏 */
        .header {
            background-color: #1e1e2f;
            border-bottom: 1px solid #333;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            color: #ccc;
        }

        .header i {
            color: #aaa;
            margin-left: 16px;
            cursor: default;
        }

        .header i:hover {
            color: #4a9eff;
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* 左侧效果控制区域 */
        .left-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }

        .panel-title {
            font-weight: 600;
            color: #ccc;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 1px;
        }

        .control-card {
            background-color: #222236;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .card-header i {
            color: #4a9eff;
        }

        .control-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .control-item label {
            color: #aaa;
            font-size: 13px;
        }

        .control-item input[type="checkbox"] {
            accent-color: #4a9eff;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .slider {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            appearance: none;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: #4a9eff;
            border-radius: 50%;
            cursor: default;
        }

        .value-label {
            color: white;
            font-size: 12px;
            min-width: 40px;
            text-align: right;
        }

        .color-btn {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: default;
        }

        .color-btn i {
            margin-right: 4px;
            color: #4a9eff;
        }

        /* 右侧当前效果列表 */
        .right-panel {
            flex: 1;
            background-color: #1a1a2a;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .right-header {
            padding: 12px 16px;
            background-color: #222236;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #ccc;
        }

        .effect-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .effect-table th {
            text-align: left;
            padding: 12px 16px;
            background-color: #2a2a3c;
            color: #aaa;
            font-weight: 400;
            border-bottom: 1px solid #444;
        }

        .effect-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #2a2a3c;
        }

        .effect-table tr:hover {
            background-color: #2a2a42;
        }

        .effect-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-active {
            background-color: #2a6d4c;
            color: #fff;
        }

        .badge-inactive {
            background-color: #5a3a3a;
            color: #ccc;
        }

        .btn-clear {
            background-color: #2a2a42;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            margin: 16px;
        }

        .btn-clear:hover {
            background-color: #3a3a5a;
        }

        .btn-clear i {
            color: #4a9eff;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <!-- 标题栏 -->
    <div class="header">
        <h2><i class="fas fa-magic" style="margin-right: 8px; color: #4a9eff;"></i>效果显示</h2>
        <div>
            <i class="fas fa-sync-alt" title="刷新"></i>
            <i class="fas fa-cog" title="设置"></i>
            <i class="fas fa-check-double" title="全部启用"></i>
            <i class="fas fa-times-circle" title="全部禁用"></i>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧效果控制区域 -->
        <div class="left-panel">
            <div class="panel-title">效果控制</div>
            
            <!-- 轨迹显示 -->
            <div class="control-card">
                <div class="card-header">
                    <h3><i class="fas fa-route" style="margin-right: 6px;"></i>轨迹显示</h3>
                </div>
                <div class="control-item">
                    <label>启用轨迹</label>
                    <input type="checkbox" checked>
                </div>
                <div class="control-item">
                    <label>颜色</label>
                    <span class="color-btn"><i class="fas fa-palette"></i> 选择颜色</span>
                </div>
                <div class="control-item">
                    <label>透明度</label>
                    <div class="slider-container">
                        <input type="range" min="0" max="100" value="80" class="slider">
                        <span class="value-label">80%</span>
                    </div>
                </div>
            </div>

            <!-- 波束显示 -->
            <div class="control-card">
                <div class="card-header">
                    <h3><i class="fas fa-wave-square" style="margin-right: 6px;"></i>波束显示</h3>
                </div>
                <div class="control-item">
                    <label>启用波束</label>
                    <input type="checkbox" checked>
                </div>
                <div class="control-item">
                    <label>颜色</label>
                    <span class="color-btn"><i class="fas fa-palette"></i> 选择颜色</span>
                </div>
                <div class="control-item">
                    <label>透明度</label>
                    <div class="slider-container">
                        <input type="range" min="0" max="100" value="50" class="slider">
                        <span class="value-label">50%</span>
                    </div>
                </div>
            </div>

            <!-- 毁伤效果 -->
            <div class="control-card">
                <div class="card-header">
                    <h3><i class="fas fa-fire" style="margin-right: 6px;"></i>毁伤效果</h3>
                </div>
                <div class="control-item">
                    <label>启用毁伤</label>
                    <input type="checkbox" checked>
                </div>
                <div class="control-item">
                    <label>效果强度</label>
                    <div class="slider-container">
                        <input type="range" min="0" max="100" value="80" class="slider">
                        <span class="value-label">80%</span>
                    </div>
                </div>
            </div>

            <!-- 威力范围 -->
            <div class="control-card">
                <div class="card-header">
                    <h3><i class="fas fa-bullseye" style="margin-right: 6px;"></i>威力范围</h3>
                </div>
                <div class="control-item">
                    <label>启用范围</label>
                    <input type="checkbox" checked>
                </div>
                <div class="control-item">
                    <label>透明度</label>
                    <div class="slider-container">
                        <input type="range" min="0" max="100" value="30" class="slider">
                        <span class="value-label">30%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧当前效果列表 -->
        <div class="right-panel">
            <div class="right-header">
                <h3><i class="fas fa-list" style="margin-right: 6px; color:#4a9eff;"></i>当前效果列表</h3>
                <span>共 6 个效果</span>
            </div>
            <div style="overflow-y: auto; flex:1;">
                <table class="effect-table">
                    <thead>
                        <tr>
                            <th>实体</th>
                            <th>效果类型</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><i class="fas fa-plane" style="color:#4a9eff; margin-right:6px;"></i>UAV-001</td>
                            <td>轨迹</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-plane" style="color:#4a9eff; margin-right:6px;"></i>UAV-002</td>
                            <td>轨迹</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-satellite-dish" style="color:#ffaa00; margin-right:6px;"></i>RAD-01</td>
                            <td>扫描波束</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-shield-alt" style="color:#ffaa00; margin-right:6px;"></i>SAM-01</td>
                            <td>威力范围</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-bomb" style="color:#ff5555; margin-right:6px;"></i>命中点-01</td>
                            <td>爆炸效果</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                        <tr>
                            <td><i class="fas fa-fire" style="color:#ffaa00; margin-right:6px;"></i>UAV-003</td>
                            <td>火焰/烟雾</td>
                            <td><span class="effect-badge badge-active">显示中</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="btn-clear">
                <i class="fas fa-trash-alt"></i> 清空所有效果
            </div>
        </div>
    </div>

    <!-- 简单脚本：滑块联动 -->
    <script>
        const sliders = document.querySelectorAll('.slider');
        sliders.forEach(slider => {
            const valueLabel = slider.nextElementSibling;
            if (valueLabel && valueLabel.classList.contains('value-label')) {
                slider.addEventListener('input', function() {
                    valueLabel.textContent = this.value + '%';
                });
            }
        });
    </script>
</body>
</html>
