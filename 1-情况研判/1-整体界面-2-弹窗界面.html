<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反辐射无人机仿真系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #03060c 100%);
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(8, 16, 30, 0.95);
            border-radius: 16px;
            border: 1px solid rgba(72, 187, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(8, 16, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(72, 187, 255, 0.3);
            overflow: hidden;
        }
        .card-header {
            padding: 12px 16px;
            background: linear-gradient(95deg, rgba(20, 40, 65, 0.9) 0%, rgba(10, 22, 45, 0.7) 100%);
            border-bottom: 1px solid rgba(72, 187, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h3 {
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
        }
        .card-header .count {
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #5BC0FF;
        }
        .card-body { padding: 0; }

        /* 左侧面板 */
        .left-panel, .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 辐射源列表 - 表格样式 */
        .source-table-wrapper { overflow-x: auto; max-height: 280px; overflow-y: auto; }
        .source-tabs {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }
        .source-tab {
            flex: 1;
            min-width: 70px;
            padding: 8px 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(30, 50, 70, 0.5);
            color: #bbd9ff;
        }
        .source-tab:hover { background: rgba(50, 80, 110, 0.6); }
        .source-tab.active {
            background: linear-gradient(135deg, #2c577c, #1a3a55);
            color: #fff;
            box-shadow: 0 2px 8px rgba(91, 192, 255, 0.3);
        }
        .source-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .source-table th {
            text-align: left;
            padding: 10px 12px;
            background: rgba(12, 26, 45, 0.9);
            color: #c2e0ff;
            font-weight: 600;
            border-bottom: 1px solid rgba(72, 187, 255, 0.4);
            font-size: 0.75rem;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .source-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(72, 120, 160, 0.2);
            vertical-align: middle;
            background-color: rgba(12, 22, 40, 0.3);
        }
        .source-table tr:hover td { background-color: rgba(30, 70, 110, 0.4); }
        .source-table tr:last-child td { border-bottom: none; }
        .threat-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .threat-high { background: rgba(255, 90, 70, 0.3); color: #ff8a7a; border: 1px solid rgba(255, 90, 70, 0.5); }
        .threat-medium { background: rgba(255, 180, 60, 0.3); color: #FFD966; border: 1px solid rgba(255, 180, 60, 0.5); }
        .threat-low { background: rgba(100, 200, 130, 0.3); color: #6fcf97; border: 1px solid rgba(100, 200, 130, 0.5); }

        /* 威力范围控制 - 合并到面板内 */
        .range-control {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(72, 120, 160, 0.2);
            flex-wrap: wrap;
        }
        .range-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(20, 40, 60, 0.6);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .range-toggle:hover { background: rgba(30, 60, 90, 0.8); }
        .range-toggle.active {
            background: rgba(91, 192, 255, 0.2);
            border-color: rgba(91, 192, 255, 0.5);
            color: #5BC0FF;
        }
        .range-toggle i { font-size: 0.8rem; }
        .range-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* 频谱分析 */
        .spectrum-container {
            position: relative;
            height: 220px;
            background: rgba(5, 10, 20, 0.8);
            padding: 12px;
        }
        .spectrum-chart {
            position: relative;
            height: calc(100% - 20px);
            background: linear-gradient(0deg, rgba(20, 40, 60, 0.3) 0%, transparent 100%);
            border-radius: 8px;
            overflow: hidden;
        }
        .spectrum-bars {
            display: flex;
            align-items: flex-end;
            height: 100%;
            padding: 0 8px;
        }
        .spectrum-bar {
            flex: 1;
            margin: 0 2px;
            border-radius: 4px 4px 0 0;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            min-width: 30px;
        }
        .spectrum-bar:hover {
            transform: scaleY(1.05);
            box-shadow: 0 0 15px currentColor;
        }
        .freq-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #8E9CB9;
            white-space: nowrap;
        }
        .spectrum-tooltip {
            position: absolute;
            background: rgba(10, 20, 40, 0.98);
            border: 1px solid rgba(91, 192, 255, 0.5);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 100;
            display: none;
            min-width: 180px;
        }
        .spectrum-tooltip.visible { display: block; }
        .tooltip-title { font-weight: 600; color: #5BC0FF; margin-bottom: 6px; font-size: 0.85rem; }
        .tooltip-info { color: #bbd9ff; font-size: 0.75rem; line-height: 1.5; }
        .tooltip-info div { margin-bottom: 3px; }

        /* 防控火力列表 */
        .firepower-list { max-height: 280px; overflow-y: auto; }
        .firepower-item {
            padding: 12px;
            border-bottom: 1px solid rgba(72, 120, 160, 0.2);
        }
        .firepower-item:last-child { border-bottom: none; }
        .firepower-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .firepower-name {
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .firepower-status {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .status-active { background: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .status-standby { background: rgba(241, 196, 15, 0.3); color: #f1c40f; }
        .status-disabled { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }
        .firepower-params {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            font-size: 0.7rem;
        }
        .param-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 8px;
            border-radius: 6px;
        }
        .param-box .label { color: #8E9CB9; font-size: 0.6rem; }
        .param-box .value { color: #5BC0FF; font-weight: 500; }
        .firepower-range {
            margin-top: 8px;
            background: rgba(20, 40, 60, 0.5);
            border-radius: 8px;
            padding: 8px;
        }
        .range-bar {
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        .range-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* 威胁评估 */
        .threat-rules {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
        }
        .rule-item {
            background: rgba(20, 40, 60, 0.5);
            padding: 8px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rule-item i { font-size: 1rem; }
        .rule-info { flex: 1; }
        .rule-info .name { font-size: 0.7rem; font-weight: 500; }
        .rule-info .value { font-size: 0.6rem; color: #8E9CB9; }
        .threat-list { max-height: 130px; overflow-y: auto; }
        .threat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(72, 120, 160, 0.15);
        }
        .threat-item:hover { background: rgba(30, 70, 110, 0.3); }
        .priority-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .rank-1 { background: linear-gradient(135deg, #ff5e4a, #ff8a7a); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #f5b042, #FFD966); color: #333; }
        .rank-3 { background: linear-gradient(135deg, #2ecc71, #6fcf97); color: #fff; }
        .threat-name { flex: 1; font-size: 0.85rem; }
        .threat-level {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* 按钮样式 */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2c577c, #1a3a55);
            color: #fff;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #3a6a94, #2a4a6d);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(20, 40, 60, 0.6);
            color: #bbd9ff;
            border: 1px solid rgba(72, 187, 255, 0.3);
        }
        .btn-secondary:hover {
            background: rgba(30, 60, 90, 0.8);
            border-color: rgba(91, 192, 255, 0.5);
        }
        .btn-danger {
            background: rgba(220, 53, 69, 0.2);
            color: #ff6b7a;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.3);
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: rgba(12, 20, 35, 0.98);
            border: 1px solid rgba(72, 187, 255, 0.3);
            border-radius: 16px;
            padding: 24px;
            min-width: 400px;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { font-size: 1.1rem; color: #5BC0FF; }
        .modal-close {
            background: none;
            border: none;
            color: #8E9CB9;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-close:hover { color: #fff; }
        .rule-config {
            margin-bottom: 16px;
        }
        .rule-config label {
            display: block;
            font-size: 0.8rem;
            color: #8E9CB9;
            margin-bottom: 8px;
        }
        .rule-config input, .rule-config select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(20, 40, 60, 0.8);
            border: 1px solid rgba(72, 187, 255, 0.3);
            border-radius: 8px;
            color: #eef2ff;
            font-size: 0.85rem;
        }
        .rule-config input:focus, .rule-config select:focus {
            outline: none;
            border-color: rgba(91, 192, 255, 0.6);
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(91, 192, 255, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(91, 192, 255, 0.5); }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="modal-container">
        <div class="main-container">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <!-- 辐射源列表 -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-broadcast-tower" style="color: #5BC0FF;"></i>
                        <h3>辐射源列表</h3>
                        <span class="count" id="sourceCount">12个目标</span>
                    </div>
                    <!-- 威力范围控制 -->
                    <div class="range-control">
                        <div class="range-toggle active" data-type="radar">
                            <i class="fas fa-satellite-dish" style="color:#ff8a7a;"></i>
                            <span>雷达</span>
                        </div>
                        <div class="range-toggle active" data-type="comm">
                            <i class="fas fa-broadcast-tower" style="color:#5bc0ff;"></i>
                            <span>电台</span>
                        </div>
                        <div class="range-toggle active" data-type="commJammer">
                            <i class="fas fa-signal-slash" style="color:#f3a683;"></i>
                            <span>通信对抗</span>
                        </div>
                        <div class="range-toggle active" data-type="radarJammer">
                            <i class="fas fa-shield-alt" style="color:#c68eff;"></i>
                            <span>雷达对抗</span>
                        </div>
                    </div>
                    <!-- Tab切换 -->
                    <div class="source-tabs">
                        <button class="source-tab active" data-type="radar">
                            <i class="fas fa-satellite-dish"></i> 雷达
                        </button>
                        <button class="source-tab" data-type="communication">
                            <i class="fas fa-broadcast-tower"></i> 电台
                        </button>
                        <button class="source-tab" data-type="comm_jammer">
                            <i class="fas fa-signal-slash"></i> 通信对抗
                        </button>
                        <button class="source-tab" data-type="radar_jammer">
                            <i class="fas fa-shield-alt"></i> 雷达对抗
                        </button>
                    </div>
                    <!-- 表格 -->
                    <div class="card-body">
                        <div class="source-table-wrapper">
                            <table class="source-table" id="sourceTable">
                                <thead id="sourceTableHead"></thead>
                                <tbody id="sourceTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 频谱分析 -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-wave-square" style="color: #5BC0FF;"></i>
                        <h3>频谱分析</h3>
                        <span class="count">实时频谱</span>
                    </div>
                    <div class="card-body">
                        <div class="spectrum-container">
                            <div class="spectrum-chart">
                                <div class="spectrum-bars" id="spectrumBars"></div>
                            </div>
                            <div class="spectrum-tooltip" id="spectrumTooltip">
                                <div class="tooltip-title">频段信息</div>
                                <div class="tooltip-info"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel">
                <!-- 防控火力 -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-bullseye" style="color: #2ecc71;"></i>
                        <h3>防控火力</h3>
                        <span class="count">5个单位</span>
                    </div>
                    <!-- 防控火力威力范围控制 -->
                    <div class="range-control">
                        <div class="range-toggle active" data-type="firepower">
                            <i class="fas fa-crosshairs" style="color:#2ecc71;"></i>
                            <span>防控火力</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="firepower-list" id="firepowerList"></div>
                    </div>
                </div>

                <!-- 威胁评估 -->
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-exclamation-triangle" style="color: #FFD966;"></i>
                        <h3>威胁评估</h3>
                        <span class="count">优先级排序</span>
                        <div class="header-actions">
                            <button class="action-btn btn-secondary" id="threatSettingsBtn">
                                <i class="fas fa-cog"></i> 设置
                            </button>
                            <button class="action-btn btn-primary" id="threatAssessBtn">
                                <i class="fas fa-play"></i> 评估
                            </button>
                        </div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="threat-rules">
                            <div class="rule-item">
                                <i class="fas fa-crosshairs" style="color:#ff8a7a;"></i>
                                <div class="rule-info">
                                    <div class="name">威胁等级</div>
                                    <div class="value" id="ruleLevel">高/中/低</div>
                                </div>
                            </div>
                            <div class="rule-item">
                                <i class="fas fa-sort-numeric-down" style="color:#5bc0ff;"></i>
                                <div class="rule-info">
                                    <div class="name">打击优先级</div>
                                    <div class="value" id="rulePriority">1-12排序</div>
                                </div>
                            </div>
                            <div class="rule-item">
                                <i class="fas fa-clock" style="color:#f3a683;"></i>
                                <div class="rule-info">
                                    <div class="name">响应时间</div>
                                    <div class="value" id="ruleResponse">≤30s</div>
                                </div>
                            </div>
                            <div class="rule-item">
                                <i class="fas fa-bullseye" style="color:#2ecc71;"></i>
                                <div class="rule-info">
                                    <div class="name">打击精度</div>
                                    <div class="value" id="ruleAccuracy">CEP≤10m</div>
                                </div>
                            </div>
                        </div>
                        <div class="threat-list" id="threatList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 威胁评估设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-cog"></i> 威胁评估规则设置</h3>
                <button class="modal-close" id="closeSettings">&times;</button>
            </div>
            <div class="rule-config">
                <label><i class="fas fa-clock"></i> 响应时间阈值 (秒)</label>
                <input type="number" id="configResponse" value="30" min="1" max="300">
            </div>
            <div class="rule-config">
                <label><i class="fas fa-bullseye"></i> 打击精度阈值 (CEP,米)</label>
                <input type="number" id="configAccuracy" value="10" min="1" max="100">
            </div>
            <div class="rule-config">
                <label><i class="fas fa-fire"></i> 高威胁权重</label>
                <select id="configHighWeight">
                    <option value="3">3倍权重</option>
                    <option value="2" selected>2倍权重</option>
                    <option value="1.5">1.5倍权重</option>
                </select>
            </div>
            <div class="rule-config">
                <label><i class="fas fa-sort-numeric-down"></i> 优先级计算方式</label>
                <select id="configPriorityMethod">
                    <option value="threat">仅按威胁等级</option>
                    <option value="comprehensive" selected>综合评估(威胁+响应+精度)</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="action-btn btn-secondary" id="cancelSettings">取消</button>
                <button class="action-btn btn-primary" id="saveSettings">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // 辐射源数据
        const sourcesData = {
            radar: [
                { name: "AN/MPQ-53 相控阵雷达", freq: "5.2~6.1GHz", prf: "200~500Hz", pw: "0.5~25μs", scan: "电子扫描", threat: "高", type: "高功率火控雷达" },
                { name: "P-18 预警雷达", freq: "150~170MHz", prf: "300Hz", pw: "8μs", scan: "6rpm", threat: "中", type: "米波远程警戒" },

                { name: "车载智能干扰站", jamType: "协议伪造/随机脉冲", coverage: "225~400MHz", erp: "200W", threat: "中", type: "自适应干扰" }
            ],
            radar_jammer: [
                { name: "SPECTRAL 侦察干扰吊舱", jamType: "距离门拖引/速度欺骗", band: "2~18GHz", tech: "DRFM转发", threat: "高", type: "先进数字射频存储" },
                { name: "Pelena-1 地面干扰站", jamType: "噪声压制/假目标", band: "8~12GHz", tech: "模拟转发", threat: "高", type: "火控雷达对抗" },
                { name: "战术侦察/干扰模块", jamType: "测频/测向+间歇采样", band: "S/C波段", tech: "数字接收", threat: "中", type: "小型化电子攻击" }
            ]
        };

        // 表头配置
        const tableHeaders = {
            radar: ['目标名称', '工作频率', '脉冲重频', '脉宽', '扫描方式', '威胁等级'],
            communication: ['目标名称', '工作频率', '调制方式', '码速率', '功率/波形', '威胁等级'],
            comm_jammer: ['目标名称', '干扰样式', '覆盖频段', '有效辐射功率', '威胁等级', '类型'],
            radar_jammer: ['目标名称', '对抗类型', '工作频段', '技术体制', '威胁等级', '类型']
        };

        // 防控火力数据
        const firepowerData = [
            { name: "红旗-16 防空系统", status: "active", type: "中程防空", range: "40km", ammo: "16枚", response: "8s", intercept: "95%" },
            { name: "道尔-M1 防空车", status: "active", type: "低空防御", range: "15km", ammo: "8枚", response: "5s", intercept: "90%" },
            { name: "PGZ-07 自行高炮", status: "standby", type: "末端防御", range: "3km", ammo: "400发", response: "3s", intercept: "85%" },
            { name: "便携式防空导弹", status: "standby", type: "单兵武器", range: "5km", ammo: "2枚", response: "10s", intercept: "80%" },
            { name: "电子对抗系统", status: "disabled", type: "软杀伤", range: "20km", mode: "压制/欺骗", power: "高", intercept: "-" }
        ];

        // 频谱数据
        const spectrumData = [
            { name: "HF", range: "3-30MHz", color: "#8B5CF6", height: 25, signals: 2 },
            { name: "VHF", range: "30-300MHz", color: "#EC4899", height: 45, signals: 5 },
            { name: "UHF", range: "300-1000MHz", color: "#F59E0B", height: 60, signals: 8 },
            { name: "L", range: "1-2GHz", color: "#10B981", height: 40, signals: 4 },
            { name: "S", range: "2-4GHz", color: "#3B82F6", height: 75, signals: 9 },
            { name: "C", range: "4-8GHz", color: "#6366F1", height: 55, signals: 6 },
            { name: "X", range: "8-12GHz", color: "#EF4444", height: 85, signals: 11 },
            { name: "Ku", range: "12-18GHz", color: "#14B8A6", height: 50, signals: 5 },
            { name: "K", range: "18-27GHz", color: "#F97316", height: 30, signals: 3 },
            { name: "Ka", range: "27-40GHz", color: "#8B5CF6", height: 20, signals: 2 }
        ];

        // 威力范围状态
        const rangeState = {
            radar: true,
            comm: true,
            commJammer: true,
            radarJammer: true,
            firepower: true
        };

        // 威胁评估配置
        let threatConfig = {
            response: 30,
            accuracy: 10,
            highWeight: 2,
            priorityMethod: 'comprehensive'
        };

        let currentSourceType = 'radar';

        // 渲染辐射源表格
        function renderSourceTable(type) {
            const thead = document.getElementById('sourceTableHead');
            const tbody = document.getElementById('sourceTableBody');
            const items = sourcesData[type];
            const headers = tableHeaders[type];

            thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;

            tbody.innerHTML = items.map(item => {
                const iconClass = type === 'radar' ? 'satellite-dish' : type === 'communication' ? 'broadcast-tower' : type === 'comm_jammer' ? 'signal-slash' : 'shield-alt';
                const iconColor = type === 'radar' ? '#ff8a7a' : type === 'communication' ? '#5bc0ff' : type === 'comm_jammer' ? '#f3a683' : '#c68eff';

                let cells = '';
                if (type === 'radar') {
                    cells = `<td><i class="fas fa-${iconClass}" style="color:${iconColor};margin-right:6px;"></i>${item.name}</td>
                        <td>${item.freq}</td><td>${item.prf}</td><td>${item.pw}</td><td>${item.scan}</td>
                        <td><span class="threat-badge threat-${item.threat === '高' ? 'high' : item.threat === '中' ? 'medium' : 'low'}">${item.threat}</span></td>`;
                } else if (type === 'communication') {
                    cells = `<td><i class="fas fa-${iconClass}" style="color:${iconColor};margin-right:6px;"></i>${item.name}</td>
                        <td>${item.freq}</td><td>${item.mod}</td><td>${item.rate || '-'}</td><td>${item.power || item.waveform}</td>
                        <td><span class="threat-badge threat-${item.threat === '高' ? 'high' : item.threat === '中' ? 'medium' : 'low'}">${item.threat}</span></td>`;
                } else if (type === 'comm_jammer') {
                    cells = `<td><i class="fas fa-${iconClass}" style="color:${iconColor};margin-right:6px;"></i>${item.name}</td>
                        <td>${item.jamType}</td><td>${item.coverage}</td><td>${item.erp}</td>
                        <td><span class="threat-badge threat-${item.threat === '高' ? 'high' : item.threat === '中' ? 'medium' : 'low'}">${item.threat}</span></td>
                        <td>${item.type}</td>`;
                } else if (type === 'radar_jammer') {
                    cells = `<td><i class="fas fa-${iconClass}" style="color:${iconColor};margin-right:6px;"></i>${item.name}</td>
                        <td>${item.jamType}</td><td>${item.band}</td><td>${item.tech}</td>
                        <td><span class="threat-badge threat-${item.threat === '高' ? 'high' : item.threat === '中' ? 'medium' : 'low'}">${item.threat}</span></td>
                        <td>${item.type}</td>`;
                }
                return `<tr>${cells}</tr>`;
            }).join('');

            document.getElementById('sourceCount').textContent = `${items.length}个目标`;
        }

        // 渲染防控火力
        function renderFirepower() {
            const list = document.getElementById('firepowerList');
            list.innerHTML = firepowerData.map(item => `
                <div class="firepower-item">
                    <div class="firepower-header">
                        <div class="firepower-name">
                            <i class="fas fa-crosshairs" style="color: ${item.status === 'active' ? '#2ecc71' : item.status === 'standby' ? '#f1c40f' : '#e74c3c'};"></i>
                            ${item.name}
                        </div>
                        <span class="firepower-status status-${item.status}">${item.status === 'active' ? '在线' : item.status === 'standby' ? '待机' : '离线'}</span>
                    </div>
                    <div class="firepower-params">
                        <div class="param-box"><div class="label">类型</div><div class="value">${item.type}</div></div>
                        <div class="param-box"><div class="label">射程</div><div class="value">${item.range}</div></div>
                        <div class="param-box"><div class="label">${item.ammo ? '弹药' : '模式'}</div><div class="value">${item.ammo || item.mode}</div></div>
                        <div class="param-box"><div class="label">响应</div><div class="value">${item.response}</div></div>
                    </div>
                    <div class="firepower-range">
                        <div style="font-size: 0.65rem; color: #8E9CB9; margin-bottom: 4px;">拦截概率</div>
                        <div class="range-bar">
                            <div class="range-fill" style="width: ${item.intercept === '-' ? '0' : item.intercept.replace('%','')}%; background: linear-gradient(90deg, #2ecc71, #27ae60);"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染威胁评估
        function renderThreatAssessment() {
            const list = document.getElementById('threatList');
            let allTargets = [];
            Object.keys(sourcesData).forEach(type => {
                sourcesData[type].forEach(item => {
                    allTargets.push({...item, type});
                });
            });
            allTargets.sort((a, b) => {
                const priority = { '高': 0, '中': 1, '低': 2 };
                return priority[a.threat] - priority[b.threat];
            });

            list.innerHTML = allTargets.map((item, index) => `
                <div class="threat-item">
                    <div class="priority-rank rank-${index < 1 ? '1' : index < 4 ? '2' : '3'}">${index + 1}</div>
                    <div class="threat-name">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <i class="fas fa-${item.type === 'radar' ? 'satellite-dish' : item.type === 'communication' ? 'broadcast-tower' : item.type === 'comm_jammer' ? 'signal-slash' : 'shield-alt'}"
                               style="color: ${item.type === 'radar' ? '#ff8a7a' : item.type === 'communication' ? '#5bc0ff' : item.type === 'comm_jammer' ? '#f3a683' : '#c68eff'}; font-size: 0.8rem;"></i>
                            ${item.name}
                        </div>
                        <div style="font-size: 0.65rem; color: #8E9CB9;">${item.type}</div>
                    </div>
                    <span class="threat-level threat-${item.threat === '高' ? 'high' : item.threat === '中' ? 'medium' : 'low'}">${item.threat}</span>
                </div>
            `).join('');
        }

        // 渲染频谱图
        function renderSpectrum() {
            const container = document.getElementById('spectrumBars');
            container.innerHTML = spectrumData.map(band => `
                <div class="spectrum-bar" style="height: ${band.height}%; background: ${band.color};"
                     data-name="${band.name}" data-range="${band.range}" data-signals="${band.signals}">
                    <span class="freq-label">${band.name}</span>
                </div>
            `).join('');

            const tooltip = document.getElementById('spectrumTooltip');
            document.querySelectorAll('.spectrum-bar').forEach(bar => {
                bar.addEventListener('mouseenter', (e) => {
                    const rect = bar.getBoundingClientRect();
                    const containerRect = document.querySelector('.spectrum-container').getBoundingClientRect();
                    tooltip.querySelector('.tooltip-title').textContent = `${bar.dataset.name}频段`;
                    tooltip.querySelector('.tooltip-info').innerHTML = `
                        <div>频率范围: ${bar.dataset.range}</div>
                        <div>信号数量: ${bar.dataset.signals}个</div>
                        <div>能量占比: ${bar.style.height}</div>
                    `;
                    tooltip.style.left = (rect.left - containerRect.left + rect.width/2 - 90) + 'px';
                    tooltip.style.top = (rect.top - containerRect.top - 85) + 'px';
                    tooltip.classList.add('visible');
                });
                bar.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
            });
        }

        // 威力范围切换
        function setupRangeToggles() {
            document.querySelectorAll('.range-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('active');
                    const type = toggle.dataset.type;
                    rangeState[type] = toggle.classList.contains('active');
                    showToast(`${toggle.querySelector('span').textContent}威力范围${rangeState[type] ? '已显示' : '已隐藏'}`);
                });
            });
        }

        // 源类型切换
        function setupSourceTabs() {
            document.querySelectorAll('.source-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentSourceType = tab.dataset.type;
                    renderSourceTable(currentSourceType);
                });
            });
        }

        // 设置弹窗
        function setupSettingsModal() {
            const modal = document.getElementById('settingsModal');
            const settingsBtn = document.getElementById('threatSettingsBtn');
            const closeBtn = document.getElementById('closeSettings');
            const cancelBtn = document.getElementById('cancelSettings');
            const saveBtn = document.getElementById('saveSettings');

            settingsBtn.addEventListener('click', () => {
                document.getElementById('configResponse').value = threatConfig.response;
                document.getElementById('configAccuracy').value = threatConfig.accuracy;
                document.getElementById('configHighWeight').value = threatConfig.highWeight;
                document.getElementById('configPriorityMethod').value = threatConfig.priorityMethod;
                modal.classList.add('visible');
            });

            const closeModal = () => modal.classList.remove('visible');
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            saveBtn.addEventListener('click', () => {
                threatConfig.response = parseInt(document.getElementById('configResponse').value);
                threatConfig.accuracy = parseInt(document.getElementById('configAccuracy').value);
                threatConfig.highWeight = parseFloat(document.getElementById('configHighWeight').value);
                threatConfig.priorityMethod = document.getElementById('configPriorityMethod').value;

                document.getElementById('ruleResponse').textContent = `≤${threatConfig.response}s`;
                document.getElementById('ruleAccuracy').textContent = `CEP≤${threatConfig.accuracy}m`;

                closeModal();
                showToast('威胁评估规则已保存');
            });
        }

        // 威胁评估按钮
        function setupThreatAssessBtn() {
            document.getElementById('threatAssessBtn').addEventListener('click', () => {
                showToast('威胁评估执行中...');
                setTimeout(() => {
                    renderThreatAssessment();
                    showToast('威胁评估完成，优先级已更新');
                }, 500);
            });
        }

        // Toast提示
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(12, 20, 35, 0.95);
                border: 1px solid rgba(91, 192, 255, 0.5);
                color: #5BC0FF;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 0.8rem;
                z-index: 1000;
                transition: opacity 0.3s;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 1500);
        }

        // 初始化
        function init() {
            renderSourceTable('radar');
            renderFirepower();
            renderThreatAssessment();
            renderSpectrum();
            setupRangeToggles();
            setupSourceTabs();
            setupSettingsModal();
            setupThreatAssessBtn();
        }

        init();
    </script>

  var selectedBox = document.createElement("div");
